<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOTA2 刀塔百科</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #1c1c1c;
  color: #e0e0e0;
  min-height: 100vh;
}

/* ── 顶部导航 ── */
header {
  background: #111;
  border-bottom: 1px solid #2a2a2a;
  padding: 0 32px;
  display: flex;
  align-items: center;
  height: 52px;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}

header .logo {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
  white-space: nowrap;
}

header nav { display: flex; gap: 2px; }

header nav a {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 18px;
  height: 52px;
  color: #aaa;
  text-decoration: none;
  font-size: 14px;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  cursor: pointer;
}

header nav a.active, header nav a:hover {
  color: #fff;
  border-bottom-color: #4fc3f7;
}

.version-badge {
  margin-left: auto;
  font-size: 12px;
  color: #666;
}
.version-badge span { color: #4fc3f7; }

.search-wrap {
  position: relative;
}
.search-wrap input {
  background: #222;
  border: 1px solid #333;
  border-radius: 4px;
  color: #ddd;
  font-size: 13px;
  padding: 5px 10px 5px 28px;
  width: 180px;
  outline: none;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: #4fc3f7; }
.search-wrap .icon {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  color: #555;
  font-size: 13px;
  pointer-events: none;
}

/* ── 主内容 ── */
main { padding: 24px 32px 48px; max-width: 1400px; margin: 0 auto; }

/* ── 属性分组 ── */
.attr-section { margin-bottom: 36px; }

.attr-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 8px;
}

.attr-header .attr-icon {
  width: 28px;
  height: 28px;
  object-fit: contain;
}

.attr-header .attr-label {
  font-size: 18px;
  font-weight: 600;
  color: #fff;
}

.attr-divider {
  flex: 1;
  height: 1px;
  background: currentColor;
  opacity: 0.4;
}

/* 属性颜色 */
.attr-str .attr-header { color: #e05555; }
.attr-agi .attr-header { color: #6ec86e; }
.attr-int .attr-header { color: #6aacee; }
.attr-all .attr-header { color: #4fd6cc; }

/* ── 两栏布局（力量+敏捷 / 智力+全才）── */
.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

/* ── 英雄网格 ── */
.hero-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}

.hero-card {
  position: relative;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  cursor: pointer;
  background: #111;
}

.hero-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
  transition: transform .2s ease;
}

.hero-card:hover img { transform: scale(1.06); }

.hero-card .hero-name {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 18px 6px 5px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  background: linear-gradient(transparent, rgba(0,0,0,0.75));
  line-height: 1.3;
  pointer-events: none;
}

.hero-card:hover .hero-name { color: #ffe082; }

/* ── 详情页 ── */
#detailView { display: none; }

.detail-hero-banner {
  position: relative;
  height: 280px;
  overflow: hidden;
}

.detail-hero-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  filter: brightness(0.6);
}

.detail-hero-banner .banner-info {
  position: absolute;
  bottom: 24px;
  left: 32px;
  display: flex;
  align-items: flex-end;
  gap: 16px;
}

.detail-hero-banner .hero-icon {
  width: 72px;
  height: 72px;
  border-radius: 6px;
  border: 2px solid rgba(255,255,255,0.3);
  object-fit: cover;
}

.detail-hero-banner .hero-title h1 {
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

.detail-hero-banner .hero-title .en { font-size: 15px; color: #aaa; margin-top: 2px; }

.detail-back {
  position: absolute;
  top: 16px;
  left: 20px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  color: #ccc;
  font-size: 13px;
  padding: 6px 14px;
  cursor: pointer;
  transition: background .15s;
}
.detail-back:hover { background: rgba(0,0,0,0.8); color: #fff; }

.detail-body {
  max-width: 960px;
  margin: 0 auto;
  padding: 28px 32px 48px;
}

/* ── 英雄介绍卡片 ── */
.hero-intro-card {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  background: #1e1e1e;
  border: 1px solid #2e2e2e;
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 24px;
}

.hero-intro-avatar {
  width: 128px;
  height: 72px;
  border-radius: 5px;
  object-fit: cover;
  object-position: top center;
  flex-shrink: 0;
  background: #111;
  border: 1px solid #333;
}

.hero-intro-rows {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.hero-intro-row {
  display: flex;
  align-items: baseline;
  padding: 6px 0;
  border-bottom: 1px solid #272727;
  font-size: 13px;
  line-height: 1.5;
}

.hero-intro-row:last-child { border-bottom: none; }

.hero-intro-label {
  width: 80px;
  flex-shrink: 0;
  color: #666;
  font-size: 12px;
}

.hero-intro-value {
  color: #ccc;
  flex: 1;
}

.hero-intro-value.name-cn {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}

.hero-intro-value.hype {
  color: #999;
  line-height: 1.7;
  font-size: 13px;
}

.hero-intro-value.hype b { color: #c8b464; font-weight: 600; }

.detail-tags { display: flex; gap: 8px; margin-bottom: 24px; }

.tag {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 3px;
  font-weight: 600;
}
.tag-str { background: rgba(224,85,85,.2); color: #e05555; border: 1px solid rgba(224,85,85,.4); }
.tag-agi { background: rgba(110,200,110,.2); color: #6ec86e; border: 1px solid rgba(110,200,110,.4); }
.tag-int { background: rgba(106,172,238,.2); color: #6aacee; border: 1px solid rgba(106,172,238,.4); }
.tag-all { background: rgba(79,214,204,.2); color: #4fd6cc; border: 1px solid rgba(79,214,204,.4); }
.tag-melee { background: rgba(180,100,50,.2); color: #e0934e; border: 1px solid rgba(180,100,50,.4); }
.tag-ranged { background: rgba(50,150,200,.2); color: #5bb8e8; border: 1px solid rgba(50,150,200,.4); }
.tag-role { background: rgba(255,255,255,.06); color: #aaa; border: 1px solid rgba(255,255,255,.1); }

.section-title {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #4fc3f7;
  border-bottom: 1px solid #2a2a3a;
  padding-bottom: 8px;
  margin-bottom: 14px;
  margin-top: 28px;
}

/* 技能列表 */
.ability-list { display: flex; flex-direction: column; gap: 12px; }

/* 技能组：主条目 + 可选的神杖/魔晶升级条目 */
.ability-group { display: flex; flex-direction: column; gap: 0; }

.ability-card {
  background: #242424;
  border: 1px solid #2e2e2e;
  border-radius: 6px;
  padding: 14px 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.ability-group .ability-card:first-child:not(:last-child) {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
  border-bottom-color: transparent;
}

.ability-group .ability-card + .ability-card {
  border-top-left-radius: 0;
  border-top-right-radius: 0;
  border-top: 1px solid #1a1a1a;
}

/* 神杖升级条目 */
.ability-card.upgrade-scepter {
  background: #1e2620;
  border-color: rgba(100, 200, 100, 0.35);
}

/* 魔晶升级条目 */
.ability-card.upgrade-shard {
  background: #1a1e26;
  border-color: rgba(120, 160, 240, 0.35);
}

.ability-card .ab-content { flex: 1; min-width: 0; }

.ability-card .ab-name {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 5px;
}

.ability-card .ab-desc {
  font-size: 13px;
  color: #999;
  line-height: 1.6;
  margin-bottom: 8px;
}

.ability-card .ab-stats {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: #666;
}

.ability-card .ab-stats b { color: #c89b3c; }

/* 升级条目的描述颜色更亮 */
.upgrade-scepter .ab-desc { color: #8ecf8e; }
.upgrade-shard .ab-desc   { color: #8ab4ef; }

/* 神杖/魔晶新增技能（独立技能，非升级） */
.ability-card.grant-scepter {
  background: #1e2620;
  border-color: rgba(100, 200, 100, 0.4);
}
.ability-card.grant-shard {
  background: #1a1e26;
  border-color: rgba(120, 160, 240, 0.4);
}
.ab-grant-label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.ab-grant-label.scepter {
  background: rgba(100, 200, 100, 0.12);
  color: #6dc86e;
  border: 1px solid rgba(100, 200, 100, 0.35);
}
.ab-grant-label.shard {
  background: rgba(120, 160, 240, 0.15);
  color: #7db4f0;
  border: 1px solid rgba(120, 160, 240, 0.4);
}

/* 先天技能徽章 */
.ab-badge-innate {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  background: rgba(220, 180, 60, 0.15);
  color: #e8c840;
  border: 1px solid rgba(220, 180, 60, 0.4);
  margin-bottom: 6px;
}

.ability-card.is-innate { border-color: rgba(220, 180, 60, 0.3); }
.ability-card.is-innate .ab-img-wrap { background: rgba(220, 180, 60, 0.08); border-radius: 5px; }

/* 技能图标容器（叠加小图标） */
.ab-img-wrap {
  position: relative;
  width: 52px;
  height: 52px;
  flex-shrink: 0;
}

.ab-img-wrap img.ab-main-img {
  width: 52px;
  height: 52px;
  border-radius: 5px;
  object-fit: cover;
  background: #111;
  display: block;
}

.ab-overlay-icons {
  position: absolute;
  bottom: 2px;
  right: 2px;
  display: flex;
  flex-direction: column-reverse;
  gap: 2px;
  align-items: flex-end;
  z-index: 2;
}

.ab-overlay-icon {
  width: 20px;
  height: 20px;
  border-radius: 3px;
  object-fit: contain;
  background: rgba(10,10,10,0.75);
  padding: 1px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
}

/* 物品页顶部标签 */

/* 物品页搜索栏 */
.items-search-bar {
  padding: 12px 32px;
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
  display: flex;
  align-items: center;
}
.items-search-bar input {
  width: 280px;
  background: #222;
  border: 1px solid #333;
  border-radius: 6px;
  color: #ddd;
  font-size: 13px;
  padding: 7px 32px 7px 30px;
  outline: none;
  transition: border-color .15s;
}
.items-search-bar input:focus { border-color: #4fc3f7; }
.items-search-icon {
  position: absolute;
  left: 42px;
  font-size: 13px;
  color: #555;
  pointer-events: none;
}
.items-search-clear {
  position: absolute;
  left: 306px;
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  font-size: 12px;
  padding: 2px 4px;
  line-height: 1;
}
.items-search-clear:hover { color: #aaa; }

/* 物品分类区域 */
.items-body {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 32px 48px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 32px;
  align-items: start;
}

.items-body.search-mode {
  display: block;
}

/* 神秘商店独占一整行 */
.item-category.full-width {
  grid-column: 1 / -1;
}

/* 分类区块 */
.item-category {
  min-width: 0;
}

.item-category-title {
  font-size: 13px;
  font-weight: 700;
  color: #a0a0a0;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

/* 物品图标网格 */
.item-icon-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.item-icon-btn {
  width: 50px;
  height: 37px;
  border-radius: 3px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid #2a2a2a;
  background: #111;
  position: relative;
  transition: border-color .12s, transform .1s;
  flex-shrink: 0;
}

.item-icon-btn:hover {
  border-color: #c89b3c;
  transform: scale(1.08);
  z-index: 2;
}

.item-icon-btn.active {
  border-color: #4fc3f7;
  box-shadow: 0 0 0 1px #4fc3f7;
}

.item-icon-btn img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 搜索模式下的列表卡片 */
.item-search-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}

.item-card {
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  border-radius: 5px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}

.item-card:hover { border-color: #4fc3f7; background: #252525; }

.item-card img {
  width: 46px;
  height: 34px;
  border-radius: 3px;
  object-fit: cover;
  flex-shrink: 0;
  background: #111;
}

.item-card .item-info { flex: 1; min-width: 0; }
.item-card .item-name { font-size: 12px; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-card .item-cost { font-size: 11px; color: #c89b3c; margin-top: 2px; }

/* 物品详情面板 */
/* ── 物品详情全页面 ── */
#itemDetailView { display: none; }

.item-detail-banner {
  position: relative;
  height: 200px;
  overflow: hidden;
  background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 40%, #1e2433 100%);
  display: flex;
  align-items: flex-end;
}

.item-detail-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 60% 40%, rgba(79,195,247,.08) 0%, transparent 70%);
}

.item-detail-banner .item-detail-banner-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 60px;
  opacity: 0.15;
  pointer-events: none;
}

.item-detail-banner .item-detail-banner-bg img {
  width: 260px;
  height: 188px;
  object-fit: contain;
  filter: blur(2px) brightness(1.2);
}

.item-detail-banner .item-banner-info {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-end;
  gap: 20px;
  padding: 0 32px 24px;
}

.item-detail-banner .item-banner-icon {
  width: 88px;
  height: 64px;
  border-radius: 6px;
  border: 2px solid rgba(255,255,255,0.25);
  object-fit: cover;
  flex-shrink: 0;
  background: #111;
}

.item-detail-banner .item-banner-title h1 {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  line-height: 1.2;
}

.item-detail-banner .item-banner-title .item-banner-en {
  font-size: 14px;
  color: #888;
  margin-top: 3px;
}

.item-detail-banner .item-banner-title .item-banner-cost {
  font-size: 14px;
  color: #c89b3c;
  font-weight: 700;
  margin-top: 6px;
}

.item-detail-back {
  position: absolute;
  top: 16px;
  left: 20px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  color: #ccc;
  font-size: 13px;
  padding: 6px 14px;
  cursor: pointer;
  transition: background .15s, color .15s;
  z-index: 10;
}
.item-detail-back:hover { background: rgba(0,0,0,0.8); color: #fff; }

.item-detail-body {
  max-width: 960px;
  margin: 0 auto;
  padding: 28px 32px 48px;
}

.item-info-card {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  background: #1e1e1e;
  border: 1px solid #2e2e2e;
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 24px;
}

.item-info-img {
  width: 128px;
  height: 93px;
  border-radius: 5px;
  object-fit: cover;
  flex-shrink: 0;
  background: #111;
  border: 1px solid #333;
}

.item-info-rows {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.item-info-row {
  display: flex;
  align-items: baseline;
  padding: 6px 0;
  border-bottom: 1px solid #272727;
  font-size: 13px;
  line-height: 1.5;
}

.item-info-row:last-child { border-bottom: none; }

.item-info-label {
  width: 80px;
  flex-shrink: 0;
  color: #666;
  font-size: 12px;
}

.item-info-value { color: #ccc; flex: 1; }
.item-info-value.cost-val { color: #c89b3c; font-weight: 700; font-size: 15px; }

.item-desc-card {
  background: #1e1e1e;
  border: 1px solid #2e2e2e;
  border-radius: 8px;
  padding: 20px 24px;
  font-size: 13px;
  color: #999;
  line-height: 1.85;
}

.item-desc-card h1 {
  font-size: 12px;
  color: #4fc3f7;
  margin-bottom: 6px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.item-desc-card h1:not(:first-child) { margin-top: 16px; }

.item-lore-card {
  background: #1e1e1e;
  border: 1px solid #2e2e2e;
  border-radius: 8px;
  padding: 18px 24px;
}

.item-lore-en {
  font-size: 13px;
  color: #555;
  line-height: 1.75;
  font-style: italic;
  margin-bottom: 10px;
}

.item-lore-zh {
  font-size: 14px;
  color: #aaa;
  line-height: 1.8;
}

/* 克制物品 */
.item-counters-grid {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.item-counter-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #1e1e1e;
  border: 1px solid #2e2e2e;
  border-radius: 7px;
  padding: 12px 16px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  flex: 1;
  min-width: 200px;
}

.item-counter-card:hover {
  border-color: #e05555;
  background: #251e1e;
}

#itemCounteredByGrid .item-counter-card:hover {
  border-color: #4caf50;
  background: #1e251e;
}

#itemCounteredByGrid .counter-reason { color: #6ec86e; }

.item-counter-card img {
  width: 60px;
  height: 44px;
  border-radius: 4px;
  object-fit: cover;
  border: 1px solid #333;
  flex-shrink: 0;
}

.item-counter-card .counter-info { flex: 1; min-width: 0; }
.item-counter-card .counter-name { font-size: 14px; font-weight: 600; color: #eee; }
.item-counter-card .counter-cost { font-size: 12px; color: #c89b3c; margin-top: 3px; }

    <div class="item-hero-counters-grid" id="itemHeroCountersGrid" style="display:none"></div>
    <div class="section-title" id="itemCounteredByTitle" style="display:none"></div>
    <div class="item-counters-grid" id="itemCounteredByGrid" style="display:none"></div>
    <div class="section-title" id="itemCountersTitle" style="display:none"></div>
    <div class="item-counters-grid" id="itemCountersGrid" style="display:none"></div>
    <div class="section-title" id="itemLoreTitle" style="display:none">背景故事</div>
    <div class="item-lore-card" id="itemLoreCard" style="display:none"></div>
  </div>
</div>

<!-- 克制图谱页 -->
<div id="graphView" style="display:none">
  <div class="graph-toolbar">
    <div class="graph-search-wrap">
      <input type="text" id="graphSearchInput" placeholder="搜索英雄或物品，点击节点展开关系..." oninput="onGraphSearch()" autocomplete="off">
      <span class="graph-search-icon">🔍</span>
      <div class="graph-search-dropdown" id="graphSearchDropdown"></div>
    </div>
    <div class="graph-legend">
      <span class="legend-dot" style="background:#4a9eff"></span><span>英雄</span>
      <span class="legend-dot" style="background:#f5a623"></span><span>物品</span>
      <span class="legend-arrow" style="color:#e05555">→</span><span>克制</span>

      <button onclick="graphZoomOut()">－</button>

        <div class="graph-node-info-sub" id="graphNodeSub"></div>

    <div class="graph-node-info-body" id="graphNodeInfoBody"></div>
  </div>

<script>
const CDN = 'https://cdn.cloudflare.steamstatic.com';
let heroesData = {}, itemsData = {}, currentTab = 'heroes', searchQuery = '';

const ATTR = {
  str: { label: '力量', color: '#e05555', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_strength.png' },
  agi: { label: '敏捷', color: '#6ec86e', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_agility.png' },
  int: { label: '智力', color: '#6aacee', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_intelligence.png' },
  all: { label: '全才', color: '#4fd6cc', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_universal.png' },
};

const ATTR_TAG = { str: 'tag-str', agi: 'tag-agi', int: 'tag-int', all: 'tag-all' };

async function loadData() {
  try {
    const [hr, ir, mr] = await Promise.all([
      fetch('/api/heroes'), fetch('/api/items'), fetch('/api/meta')
    ]);
    heroesData = await hr.json();
    itemsData = await ir.json();
    const meta = await mr.json();
    if (meta.patch) {
      const d = meta.patch_date ? new Date(meta.patch_date).toLocaleDateString('zh-CN') : '';
      document.getElementById('versionBadge').innerHTML = `版本 <span>${meta.patch}</span>${d ? ' · ' + d : ''}`;
    }
    renderHeroes();
  } catch(e) {
    document.getElementById('heroesMain').innerHTML = '<div class="empty-state">数据加载失败，请确认 Flask 已启动</div>';
  }
}

function showTab(tab) {
  currentTab = tab;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('header nav a').forEach((a, i) =>
    a.classList.toggle('active', (i === 0 && tab === 'heroes') || (i === 1 && tab === 'items') || (i === 2 && tab === 'graph')));
  document.getElementById('heroesView').style.display = tab === 'heroes' ? '' : 'none';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('itemsView').style.display = tab === 'items' ? '' : 'none';
  document.getElementById('itemDetailView').style.display = 'none';
  document.getElementById('graphView').style.display = tab === 'graph' ? '' : 'none';
  if (tab === 'heroes') renderHeroes();
  else if (tab === 'items') renderItems();
  else if (tab === 'graph') initGraph();
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  if (currentTab === 'heroes') renderHeroes();
  else renderItems();
}

let heroSearchQuery = '';
function onHeroSearch() {
  heroSearchQuery = document.getElementById('heroSearchInput').value.trim().toLowerCase();
  document.getElementById('heroSearchClear').style.display = heroSearchQuery ? '' : 'none';
  renderHeroes();
}
function clearHeroSearch() {
  document.getElementById('heroSearchInput').value = '';
  document.getElementById('heroSearchClear').style.display = 'none';
  heroSearchQuery = '';
  renderHeroes();
}
function heroMatchesSearch(h, q) {
  if (!q) return true;
  if (h.name && h.name.toLowerCase().includes(q)) return true;
  if (h.name_en && h.name_en.toLowerCase().includes(q)) return true;
  if (h.nickname && h.nickname.some(n => n.toLowerCase().includes(q))) return true;
  return false;
}

// ── 英雄列表 ──
function renderHeroes() {
  const order = ['str', 'agi', 'int', 'all'];
  const grouped = { str: [], agi: [], int: [], all: [] };

  const effectiveQuery = heroSearchQuery || searchQuery;
  for (const [key, h] of Object.entries(heroesData)) {
    const attr = h.primary_attr;
    if (!grouped[attr]) continue;
    if (!heroMatchesSearch(h, effectiveQuery)) continue;
    grouped[attr].push([key, h]);
  }

  // 两栏：左(力量+智力) 右(敏捷+全才) — 按截图布局
  const leftAttrs = ['str', 'int'];
  const rightAttrs = ['agi', 'all'];

  let html = '<div class="columns">';

  for (let col = 0; col < 2; col++) {
    html += '<div>';
    const attrs = col === 0 ? leftAttrs : rightAttrs;
    for (const attr of attrs) {
      const heroes = grouped[attr];
      if (!heroes.length) continue;
      const info = ATTR[attr];
      html += `
        <div class="attr-section attr-${attr}">
          <div class="attr-header">
            <img class="attr-icon" src="${info.icon}" onerror="this.style.display='none'">
            <span class="attr-label">${info.label}</span>
            <div class="attr-divider" style="color:${info.color}"></div>
          </div>
          <div class="hero-grid">
            ${heroes.map(([key, h]) => `
              <div class="hero-card" onclick="showHeroDetail('${key}')">
                ${h.img ? `<img src="${h.img}" alt="${h.name}" loading="lazy" onerror="this.style.opacity='.3'">` : ''}
                <div class="hero-name">${h.name}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }
    html += '</div>';
  }
  html += '</div>';

  const anyResult = Object.values(grouped).some(g => g.length > 0);
  document.getElementById('heroesMain').innerHTML = anyResult ? html : '<div class="empty-state">没有找到匹配的英雄</div>';
}

// ── 英雄详情 ──
function showHeroDetail(key) {
  const h = heroesData[key];
  if (!h) return;

  document.getElementById('heroesView').style.display = 'none';
  document.getElementById('itemsView').style.display = 'none';
  document.getElementById('itemDetailView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  currentTab = 'heroes';

  document.getElementById('detailBanner').src = h.img || '';
  document.getElementById('detailIcon').src = h.icon || '';
  document.getElementById('detailName').textContent = h.name;
  document.getElementById('detailEn').textContent = h.name_en;

  const attrInfo = ATTR[h.primary_attr] || {};
  const attrLabel = attrInfo.label || h.primary_attr;
  const attackLabel = h.attack_type === 'Melee' ? '近战' : '远程';
  const ROLE_CN = {
    'Carry': '核心', 'Support': '辅助', 'Nuker': '爆发', 'Disabler': '控制',
    'Jungler': '打野', 'Durable': '耐久', 'Escape': '逃脱', 'Pusher': '推线',
    'Initiator': '发起', 'Lane Support': '线辅'
  };
  const rolesLabel = (h.roles || []).map(r => ROLE_CN[r] || r).join('、');
  const rows = [
    { label: '名称',     value: h.name,     cls: 'name-cn' },
    { label: '英文名',   value: h.name_en },
    (h.nickname && h.nickname.length) ? { label: '绰号', value: h.nickname.join('、') } : null,
    { label: '主属性',   value: attrLabel },
    { label: '攻击方式', value: attackLabel },
    rolesLabel ? { label: '定位',  value: rolesLabel } : null,
    h.move_speed  != null ? { label: '移动速度', value: h.move_speed }  : null,
    h.attack_range != null ? { label: '攻击距离', value: h.attack_range } : null,
    h.hype ? { label: '故事背景', value: h.hype, cls: 'hype' } : null,
  ].filter(Boolean);

  document.getElementById('heroIntroCard').innerHTML = `
    <div class="hero-intro-card">
      <img class="hero-intro-avatar" src="${h.img || ''}" alt="${h.name}" onerror="this.style.opacity='.3'">
      <div class="hero-intro-rows">
        ${rows.map(r => `
          <div class="hero-intro-row">
            <span class="hero-intro-label">${r.label}</span>
            <span class="hero-intro-value${r.cls ? ' ' + r.cls : ''}">${r.value}</span>
          </div>`).join('')}
      </div>
    </div>`;

  const validAbilities = (h.abilities || []).filter(ab =>
    ab.name && ab.name !== ab.key && !ab.key.includes('generic_hidden')
  ).sort((a, b) => {
    const rank = x => x.is_innate ? 0 : (x.grant_scepter || x.grant_shard) ? 2 : 1;
    return rank(a) - rank(b);
  });

  const INNATE_ICON  = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/innate_icon.png';
  const SCEPTER_ICON = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/ultimate_scepter.png';
  const SHARD_ICON   = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/aghanims_shard.png';

  function renderAbilityImg(imgUrl, abName, overlayIconSrc) {
    const overlay = overlayIconSrc
      ? `<div class="ab-overlay-icons"><img class="ab-overlay-icon" src="${overlayIconSrc}" onerror="this.style.display='none'"></div>`
      : '';
    return `
      <div class="ab-img-wrap">
        <img class="ab-main-img" src="${imgUrl}" alt="${abName}" onerror="this.onerror=null;this.src='';this.style.opacity='0'">
        ${overlay}
      </div>`;
  }

  document.getElementById('abilityList').innerHTML = validAbilities.map(ab => {
    const imgUrl = `${CDN}/apps/dota2/images/dota_react/abilities/${ab.key}.png`;
    const cd = ab.cooldown && ab.cooldown !== '0' ? `<b>${ab.cooldown}</b>s` : '';
    const mc = ab.manacost && ab.manacost !== '0' ? `<b>${ab.manacost}</b>` : '';
    const stats = [cd ? `冷却 ${cd}` : '', mc ? `耗蓝 ${mc}` : ''].filter(Boolean).join(' &emsp; ');

    // 神杖/魔晶新增技能：技能本身就是由神杖/魔晶解锁的独立新技能
    if (ab.grant_scepter || ab.grant_shard) {
      const grantIcon = ab.grant_scepter ? SCEPTER_ICON : SHARD_ICON;
      const grantClass = ab.grant_scepter ? 'grant-scepter' : 'grant-shard';
      const grantLabelClass = ab.grant_scepter ? 'scepter' : 'shard';
      const grantLabelText = ab.grant_scepter ? '阿哈利姆神杖' : '阿哈利姆魔晶';
      return `<div class="ability-group">
        <div class="ability-card ${grantClass}">
          ${renderAbilityImg(imgUrl, ab.name, grantIcon)}
          <div class="ab-content">
            <div class="ab-grant-label ${grantLabelClass}">
              <img src="${grantIcon}" style="width:14px;height:14px;object-fit:contain;vertical-align:middle" onerror="this.style.display='none'">
              ${grantLabelText} 新增技能
            </div>
            <div class="ab-name">${ab.name}</div>
            ${ab.description ? `<div class="ab-desc">${formatDesc(ab.description, ab.attrib)}</div>` : ''}
            ${stats ? `<div class="ab-stats">${stats}</div>` : ''}
          </div>
        </div>
      </div>`;
    }

    // 主条目：先天技能直接显示先天图标充满格子，普通技能正常显示
    const mainImgUrl = ab.is_innate ? INNATE_ICON : imgUrl;
    const mainCard = `
      <div class="ability-card${ab.is_innate ? ' is-innate' : ''}">
        ${renderAbilityImg(mainImgUrl, ab.name, null)}
        <div class="ab-content">
          ${ab.is_innate ? '<span class="ab-badge-innate">先天技能</span>' : ''}
          <div class="ab-name">${ab.name}</div>
          ${ab.description ? `<div class="ab-desc">${formatDesc(ab.description, ab.attrib)}</div>` : ''}
          ${stats ? `<div class="ab-stats">${stats}</div>` : ''}
        </div>
      </div>`;

    // 神杖升级条目（强化已有技能）
    const scepterCard = ab.scepter_desc ? `
      <div class="ability-card upgrade-scepter">
        ${renderAbilityImg(imgUrl, ab.name, SCEPTER_ICON)}
        <div class="ab-content">
          <div class="ab-name">${ab.name} <span style="font-size:12px;font-weight:400;color:#6dc86e">· 阿哈利姆神杖</span></div>
          <div class="ab-desc">${formatDesc(ab.scepter_desc, ab.attrib)}</div>
        </div>
      </div>` : '';

    // 魔晶升级条目（强化已有技能）
    const shardCard = ab.shard_desc ? `
      <div class="ability-card upgrade-shard">
        ${renderAbilityImg(imgUrl, ab.name, SHARD_ICON)}
        <div class="ab-content">
          <div class="ab-name">${ab.name} <span style="font-size:12px;font-weight:400;color:#7db4f0">· 阿哈利姆魔晶</span></div>
          <div class="ab-desc">${formatDesc(ab.shard_desc, ab.attrib)}</div>
        </div>
      </div>` : '';

    return `<div class="ability-group">${mainCard}${scepterCard}${shardCard}</div>`;
  }).join('') || '<div style="color:#555;font-size:13px;padding:8px 0">暂无技能数据</div>';

  // ── 天赋树 ──
  const talents = h.talents || [];
  const talentTitle = document.getElementById('talentTitle');
  const talentTreeWrap = document.getElementById('talentTreeWrap');
  const talentTree = document.getElementById('talentTree');
  if (talents.length) {
    talentTitle.style.display = '';
    talentTreeWrap.style.display = '';
    const sorted = [...talents].sort((a, b) => b.game_level - a.game_level);
    talentTree.innerHTML = sorted.map(t => {
      const leftName = t.left ? t.left.name : '';
      const rightName = t.right ? t.right.name : '';
      return `
        <div class="talent-row">
          <div class="talent-cell left">${leftName}</div>
          <div class="talent-level-badge">${t.game_level}</div>
          <div class="talent-cell right">${rightName}</div>
        </div>`;
    }).join('');
  } else {
    talentTitle.style.display = 'none';
    talentTreeWrap.style.display = 'none';
    talentTree.innerHTML = '';
  }

  // ── 克制关系 ──
  const counterTitle = document.getElementById('counterTitle');
  const counterGraphWrap = document.getElementById('counterGraphWrap');
  const counterSection = document.getElementById('counterSection');
  counterTitle.style.display = 'none';
  counterGraphWrap.style.display = 'none';
  counterSection.innerHTML = '<div class="counter-loading">加载克制数据中...</div>';

  const shortKey = key.replace('npc_dota_hero_', '');
  fetch(`/api/counters/${shortKey}`)
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data || !data.countered_by || !data.countered_by.length) {
        counterSection.innerHTML = '';
        return;
      }
      counterTitle.style.display = '';

      // 渲染力导向图
      renderCounterGraph(data, h);

      // 渲染卡片列表
      counterSection.innerHTML = `<div class="counter-grid">${
        data.countered_by.map(c => {
          const iconUrl = `${CDN}/apps/dota2/images/dota_react/heroes/icons/${c.key}.png`;
          const strengthLabel = c.strength === 'strong' ? '强力克制' : '一定克制';
          const reasons = (c.reasons || []).map(r =>
            `<div class="counter-reason">${r}</div>`
          ).join('');
          return `
            <div class="counter-card">
              <div class="counter-card-header">
                <img class="counter-hero-icon" src="${iconUrl}" alt="${c.name}" onerror="this.style.opacity='.3'">
                <span class="counter-hero-name">${c.name}</span>
                <span class="counter-strength-badge ${c.strength}">${strengthLabel}</span>
              </div>
              <div class="counter-reasons">${reasons}</div>
            </div>`;
        }).join('')
      }</div>`;
    })
    .catch(() => { counterSection.innerHTML = ''; });

  // ── 配合关系 ──
  const synergyTitle = document.getElementById('synergyTitle');
  const synergyGraphWrap = document.getElementById('synergyGraphWrap');
  const synergySection = document.getElementById('synergySection');
  synergyTitle.style.display = 'none';
  synergyGraphWrap.style.display = 'none';
  synergySection.innerHTML = '<div class="synergy-loading">加载配合数据中...</div>';

  fetch(`/api/synergies/${shortKey}`)
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data || !data.synergies || !data.synergies.length) {
        synergySection.innerHTML = '';
        return;
      }
      synergyTitle.style.display = '';

      renderSynergyGraph(data, h);

      synergySection.innerHTML = `<div class="synergy-grid">${
        data.synergies.map(c => {
          const iconUrl = `${CDN}/apps/dota2/images/dota_react/heroes/icons/${c.key}.png`;
          const strengthLabel = c.strength === 'strong' ? '强力配合' : '良好配合';
          const reasons = (c.reasons || []).map(r =>
            `<div class="synergy-reason">${r}</div>`
          ).join('');
          return `
            <div class="synergy-card">
              <div class="synergy-card-header">
                <img class="synergy-hero-icon" src="${iconUrl}" alt="${c.name}" onerror="this.style.opacity='.3'">
                <span class="synergy-hero-name">${c.name}</span>
                <span class="synergy-strength-badge ${c.strength}">${strengthLabel}</span>
              </div>
              <div class="synergy-reasons">${reasons}</div>
            </div>`;
        }).join('')
      }</div>`;
    })
    .catch(() => { synergySection.innerHTML = ''; });

  window.scrollTo(0, 0);
}

function renderCounterGraph(data, centerHero) {
  const wrap = document.getElementById('counterGraphWrap');
  const svgEl = document.getElementById('counterGraphSvg');
  const tooltip = document.getElementById('counterTooltip');

  // 清除上次渲染
  d3.select(svgEl).selectAll('*').remove();

  const W = wrap.clientWidth || 700;
  const H = Math.max(420, Math.min(560, W * 0.65));
  svgEl.setAttribute('height', H);

  const counters = data.countered_by;
  const nodes = [
    { id: 'center', name: centerHero.name, iconUrl: centerHero.icon, isCenter: true }
  ].concat(counters.map(c => ({
    id: c.key,
    name: c.name,
    key: c.key,
    strength: c.strength,
    reasons: c.reasons,
    isCenter: false
  })));

  const links = counters.map(c => ({
    source: c.key,
    target: 'center',
    strength: c.strength
  }));

  const svg = d3.select(svgEl)
    .attr('width', W)
    .attr('height', H);

  // 箭头标记
  const defs = svg.append('defs');
  ['strong','moderate'].forEach(s => {
    defs.append('marker')
      .attr('id', `arrow-${s}`)
      .attr('viewBox', '0 -4 8 8')
      .attr('refX', 28)
      .attr('refY', 0)
      .attr('markerWidth', 6)
      .attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-4L8,0L0,4')
      .attr('fill', s === 'strong' ? '#c84040' : '#b08020');
  });

  // 背景图片 clip-path (圆形头像)
  nodes.forEach(n => {
    defs.append('clipPath')
      .attr('id', `clip-${n.id}`)
      .append('circle')
      .attr('r', n.isCenter ? 38 : 26);
  });

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.strength === 'strong' ? 155 : 185).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-320))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(50));

  // 连线
  const link = svg.append('g').selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', d => d.strength === 'strong' ? '#c84040' : '#b08020')
    .attr('stroke-width', d => d.strength === 'strong' ? 2 : 1.2)
    .attr('stroke-opacity', d => d.strength === 'strong' ? 0.7 : 0.45)
    .attr('marker-end', d => `url(#arrow-${d.strength})`);

  // 节点组
  const node = svg.append('g').selectAll('g')
    .data(nodes)
    .join('g')
    .attr('cursor', 'grab')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    );

  // 节点背景圆
  node.append('circle')
    .attr('r', d => d.isCenter ? 40 : 28)
    .attr('fill', d => d.isCenter ? '#2a2010' : (d.strength === 'strong' ? '#2a1010' : '#1e1a08'))
    .attr('stroke', d => d.isCenter ? '#c89b3c' : (d.strength === 'strong' ? '#c84040' : '#b08020'))
    .attr('stroke-width', d => d.isCenter ? 2.5 : 1.5);

  // 英雄头像
  node.append('image')
    .attr('href', d => d.isCenter
      ? d.iconUrl
      : `${CDN}/apps/dota2/images/dota_react/heroes/icons/${d.key}.png`
    )
    .attr('x', d => d.isCenter ? -38 : -26)
    .attr('y', d => d.isCenter ? -38 : -26)
    .attr('width',  d => d.isCenter ? 76 : 52)
    .attr('height', d => d.isCenter ? 76 : 52)
    .attr('clip-path', d => `url(#clip-${d.id})`)
    .attr('preserveAspectRatio', 'xMidYMid slice');

  // 中心节点光环
  node.filter(d => d.isCenter)
    .append('circle')
    .attr('r', 44)
    .attr('fill', 'none')
    .attr('stroke', '#c89b3c')
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.3)
    .attr('stroke-dasharray', '4 3');

  // 节点名称标签
  node.append('text')
    .attr('y', d => d.isCenter ? 56 : 40)
    .attr('text-anchor', 'middle')
    .attr('font-size', d => d.isCenter ? 13 : 11)
    .attr('font-weight', d => d.isCenter ? 700 : 500)
    .attr('fill', d => d.isCenter ? '#c89b3c' : '#a09070')
    .attr('pointer-events', 'none')
    .text(d => d.name);

  // tooltip 交互（只有非中心节点显示）
  node.filter(d => !d.isCenter)
    .on('mouseenter', (event, d) => {
      const strengthLabel = d.strength === 'strong' ? '<span style="color:#f07070">强力克制</span>' : '<span style="color:#c8a040">一定克制</span>';
      const reasonsHtml = (d.reasons || []).map(r => `<div style="margin-top:4px;color:#8a8070">· ${r}</div>`).join('');
      tooltip.innerHTML = `<div style="font-weight:700;margin-bottom:4px">${d.name} ${strengthLabel}</div>${reasonsHtml}`;
      tooltip.style.display = 'block';
    })
    .on('mousemove', event => {
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      let x = event.clientX + 14, y = event.clientY - 10;
      if (x + tw > window.innerWidth - 8) x = event.clientX - tw - 14;
      if (y + th > window.innerHeight - 8) y = event.clientY - th - 10;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    })
    .on('mouseleave', () => { tooltip.style.display = 'none'; });

  simulation.on('tick', () => {
    const r = d => d.isCenter ? 42 : 30;
    link
      .attr('x1', d => clamp(d.source.x, r(d.source), W - r(d.source)))
      .attr('y1', d => clamp(d.source.y, r(d.source), H - r(d.source)))
      .attr('x2', d => clamp(d.target.x, r(d.target), W - r(d.target)))
      .attr('y2', d => clamp(d.target.y, r(d.target), H - r(d.target)));
    node.attr('transform', d =>
      `translate(${clamp(d.x, r(d), W - r(d))},${clamp(d.y, r(d), H - r(d))})`
    );
  });

  wrap.style.display = '';
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function renderSynergyGraph(data, centerHero) {
  const wrap = document.getElementById('synergyGraphWrap');
  const svgEl = document.getElementById('synergyGraphSvg');
  const tooltip = document.getElementById('synergyTooltip');

  d3.select(svgEl).selectAll('*').remove();

  const W = wrap.clientWidth || 700;
  const H = Math.max(420, Math.min(560, W * 0.65));
  svgEl.setAttribute('height', H);

  const synergies = data.synergies;
  const nodes = [
    { id: 'center', name: centerHero.name, iconUrl: centerHero.icon, isCenter: true }
  ].concat(synergies.map(c => ({
    id: c.key,
    name: c.name,
    key: c.key,
    strength: c.strength,
    reasons: c.reasons,
    isCenter: false
  })));

  const links = synergies.map(c => ({
    source: c.key,
    target: 'center',
    strength: c.strength
  }));

  const svg = d3.select(svgEl)
    .attr('width', W)
    .attr('height', H);

  const defs = svg.append('defs');
  ['strong','good'].forEach(s => {
    defs.append('marker')
      .attr('id', `syn-arrow-${s}`)
      .attr('viewBox', '0 -4 8 8')
      .attr('refX', 28)
      .attr('refY', 0)
      .attr('markerWidth', 6)
      .attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-4L8,0L0,4')
      .attr('fill', s === 'strong' ? '#40c860' : '#40a050');
  });

  nodes.forEach(n => {
    defs.append('clipPath')
      .attr('id', `syn-clip-${n.id}`)
      .append('circle')
      .attr('r', n.isCenter ? 38 : 26);
  });

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.strength === 'strong' ? 155 : 185).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-320))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(50));

  const link = svg.append('g').selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', d => d.strength === 'strong' ? '#40c860' : '#40a050')
    .attr('stroke-width', d => d.strength === 'strong' ? 2 : 1.2)
    .attr('stroke-opacity', d => d.strength === 'strong' ? 0.7 : 0.45)
    .attr('marker-end', d => `url(#syn-arrow-${d.strength})`);

  const node = svg.append('g').selectAll('g')
    .data(nodes)
    .join('g')
    .attr('cursor', 'grab')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    );

  node.append('circle')
    .attr('r', d => d.isCenter ? 40 : 28)
    .attr('fill', d => d.isCenter ? '#102018' : (d.strength === 'strong' ? '#102010' : '#0e1a10'))
    .attr('stroke', d => d.isCenter ? '#3cb870' : (d.strength === 'strong' ? '#40c860' : '#40a050'))
    .attr('stroke-width', d => d.isCenter ? 2.5 : 1.5);

  node.append('image')
    .attr('href', d => d.isCenter
      ? d.iconUrl
      : `${CDN}/apps/dota2/images/dota_react/heroes/icons/${d.key}.png`
    )
    .attr('x', d => d.isCenter ? -38 : -26)
    .attr('y', d => d.isCenter ? -38 : -26)
    .attr('width',  d => d.isCenter ? 76 : 52)
    .attr('height', d => d.isCenter ? 76 : 52)
    .attr('clip-path', d => `url(#syn-clip-${d.id})`)
    .attr('preserveAspectRatio', 'xMidYMid slice');

  node.filter(d => d.isCenter)
    .append('circle')
    .attr('r', 44)
    .attr('fill', 'none')
    .attr('stroke', '#3cb870')
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.3)
    .attr('stroke-dasharray', '4 3');

  node.append('text')
    .attr('y', d => d.isCenter ? 56 : 40)
    .attr('text-anchor', 'middle')
    .attr('font-size', d => d.isCenter ? 13 : 11)
    .attr('font-weight', d => d.isCenter ? 700 : 500)
    .attr('fill', d => d.isCenter ? '#3cb870' : '#70a070')
    .attr('pointer-events', 'none')
    .text(d => d.name);

  node.filter(d => !d.isCenter)
    .on('mouseenter', (event, d) => {
      const strengthLabel = d.strength === 'strong' ? '<span style="color:#60d870">强力配合</span>' : '<span style="color:#70b880">良好配合</span>';
      const reasonsHtml = (d.reasons || []).map(r => `<div style="margin-top:4px;color:#608060">· ${r}</div>`).join('');
      tooltip.innerHTML = `<div style="font-weight:700;margin-bottom:4px">${d.name} ${strengthLabel}</div>${reasonsHtml}`;
      tooltip.style.display = 'block';
    })
    .on('mousemove', event => {
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      let x = event.clientX + 14, y = event.clientY - 10;
      if (x + tw > window.innerWidth - 8) x = event.clientX - tw - 14;
      if (y + th > window.innerHeight - 8) y = event.clientY - th - 10;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    })
    .on('mouseleave', () => { tooltip.style.display = 'none'; });

  simulation.on('tick', () => {
    const r = d => d.isCenter ? 42 : 30;
    link
      .attr('x1', d => clamp(d.source.x, r(d.source), W - r(d.source)))
      .attr('y1', d => clamp(d.source.y, r(d.source), H - r(d.source)))
      .attr('x2', d => clamp(d.target.x, r(d.target), W - r(d.target)))
      .attr('y2', d => clamp(d.target.y, r(d.target), H - r(d.target)));
    node.attr('transform', d =>
      `translate(${clamp(d.x, r(d), W - r(d))},${clamp(d.y, r(d), H - r(d))})`
    );
  });

  wrap.style.display = '';
}

let itemSearchQuery = '';
let activeItemKey = null;

function onItemSearch() {
  itemSearchQuery = document.getElementById('itemSearchInput').value.trim().toLowerCase();
  document.getElementById('itemSearchClear').style.display = itemSearchQuery ? '' : 'none';
  renderItems();
}

function clearItemSearch() {
  document.getElementById('itemSearchInput').value = '';
  document.getElementById('itemSearchClear').style.display = 'none';
  itemSearchQuery = '';
  renderItems();
}

// ── 物品列表 ──
function renderItems() {
  const body = document.getElementById('itemsBody');
  const empty = document.getElementById('itemEmpty');

  if (itemSearchQuery) {
    // 搜索模式：扁平列表
    body.className = 'items-body search-mode';
    const entries = Object.entries(itemsData).filter(([, item]) => {
      if (!item.name_en) return false;
      if (item.name && item.name.toLowerCase().includes(itemSearchQuery)) return true;
      if (item.name_en.toLowerCase().includes(itemSearchQuery)) return true;
      return false;
    });
    empty.style.display = entries.length ? 'none' : 'block';
    body.innerHTML = `<div class="item-search-list">${entries.map(([key, item]) => `
      <div class="item-card" onclick="showItemPanel('${key}')">
        ${item.img ? `<img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.style.opacity='.3'">` : ''}
        <div class="item-info">
          <div class="item-name">${item.name || item.name_en}</div>
          ${item.cost ? `<div class="item-cost">💰 ${item.cost}</div>` : ''}
        </div>
      </div>`).join('')}</div>`;
    return;
  }

  empty.style.display = 'none';
  body.className = 'items-body';
  const categories = [...(ITEM_CATEGORIES.basic || []), ...(ITEM_CATEGORIES.upgrade || [])];

  body.innerHTML = categories.map(cat => {
    const items = cat.keys
      .map(k => [k, itemsData[k]])
      .filter(([, v]) => v && v.img);

    if (!items.length) return '';

    const isFullWidth = cat.id === 'secret';
    return `
      <div class="item-category${isFullWidth ? ' full-width' : ''}">
        <div class="item-category-title">${cat.label}</div>
        <div class="item-icon-grid">
          ${items.map(([key, item]) => `
            <div class="item-icon-btn" onclick="showItemPanel('${key}')" title="${item.name || item.name_en}">
              <img src="${item.img}" alt="${item.name || ''}" loading="lazy" onerror="this.style.opacity='.3'">
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function showItemPanel(key) {
  const item = itemsData[key];
  if (!item) return;

  activeItemKey = key;

  document.getElementById('itemDetailIcon').src = item.img || '';
  document.getElementById('itemDetailBgImg').src = item.img || '';
  document.getElementById('itemDetailName').textContent = item.name || item.name_en;
  document.getElementById('itemDetailEn').textContent = item.name_en || '';
  document.getElementById('itemDetailCost').textContent = item.cost != null ? `💰 ${item.cost} 金币` : '';

  const attrib = item.attrib || {};
  const bonuses = item.bonuses || [];

  // 属性加成区域
  if (bonuses.length > 0) {
    document.getElementById('itemBonusesSection').style.display = '';
    document.getElementById('itemBonusesGrid').innerHTML = bonuses.map(b => {
      const valDisplay = b.pct ? `${b.sign}${b.value}%` : `${b.sign}${b.value}`;
      const cls = b.sign === '-' ? 'neg' : 'pos';
      return `<div class="item-bonus-row">
        <span class="item-bonus-val ${cls}">${valDisplay}</span>
        <span class="item-bonus-label">${b.label}</span>
      </div>`;
    }).join('');
  } else {
    document.getElementById('itemBonusesSection').style.display = 'none';
  }

  // 基本信息卡片（仅保留冷却/蓝耗等非bonus信息）
  const rows = [];
  const cd = item.cooldown && item.cooldown !== '0' && item.cooldown !== 'null' && item.cooldown !== 'False' ? item.cooldown : '';
  const mc = item.manacost && item.manacost !== '0' && item.manacost !== 'null' && item.manacost !== 'False' ? item.manacost : '';
  if (cd) rows.push({ label: '冷却时间', value: `${cd}s` });
  if (mc) rows.push({ label: '消耗蓝量', value: mc });
  if (item.cost != null) rows.push({ label: '购买价格', value: `${item.cost} 金币`, cls: 'cost-val' });

  document.getElementById('itemInfoCard').innerHTML = rows.length ? `
    <div class="item-info-card">
      <img class="item-info-img" src="${item.img || ''}" alt="${item.name || ''}" onerror="this.style.opacity='.3'">
      <div class="item-info-rows">
        ${rows.map(r => `
          <div class="item-info-row">
            <span class="item-info-label">${r.label}</span>
            <span class="item-info-value${r.cls ? ' ' + r.cls : ''}">${r.value}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  // 技能描述
  const descHtml = item.description ? formatDesc(item.description, attrib) : '';
  if (descHtml) {
    document.getElementById('itemDescTitle').style.display = '';
    document.getElementById('itemDescCard').style.display = '';
    document.getElementById('itemDescCard').innerHTML = descHtml;
  } else {
    document.getElementById('itemDescTitle').style.display = 'none';
    document.getElementById('itemDescCard').style.display = 'none';
  }

  function renderCounterGrid(elId, entries) {
    const grid = document.getElementById(elId);
    grid.innerHTML = entries.map(({ key: cKey, item: c, reason }) => `
      <div class="item-counter-card" onclick="showItemPanel('${cKey}')">
        <img src="${c.img || ''}" alt="${c.name || ''}" onerror="this.style.opacity='.3'">
        <div class="counter-info">
          <div class="counter-name">${c.name || c.name_en}</div>
          ${c.cost != null ? `<div class="counter-cost">💰 ${c.cost} 金币</div>` : ''}
          ${reason ? `<div class="counter-reason">${reason}</div>` : ''}
        </div>
      </div>`).join('');
  }

  function renderHeroCounterGrid(elId, entries) {
    const grid = document.getElementById(elId);
    grid.innerHTML = entries.map(({ heroKey, hero, reason }) => `
      <div class="item-hero-counter-card" onclick="showHeroDetail('${heroKey}')">
        <img src="${hero.icon || hero.img || ''}" alt="${hero.name || ''}" onerror="this.style.opacity='.3'">
        <div class="hero-counter-info">
          <div class="hero-counter-name">${hero.name || hero.name_en}</div>
          ${reason ? `<div class="hero-counter-reason">${reason}</div>` : ''}
        </div>
      </div>`).join('');
  }

  function parseCounterEntries(list) {
    return (list || []).map(e => {
      const cKey = typeof e === 'string' ? e : e.counter;
      const reason = typeof e === 'object' ? (e.reason || '') : '';
      const cItem = itemsData[cKey];
      return cItem ? { key: cKey, item: cItem, reason } : null;
    }).filter(Boolean);
  }

  function parseHeroCounterEntries(list) {
    return (list || []).map(e => {
      if (typeof e !== 'object') return null;
      const shortKey = e.hero;
      const fullKey = `npc_dota_hero_${shortKey}`;
      const hero = heroesData[fullKey];
      return hero ? { heroKey: fullKey, hero, reason: e.reason || '' } : null;
    }).filter(Boolean);
  }

  const itemDisplayName = item.name || item.name_en;

  // hero_counters = 被该物品克制的英雄
  const heroCounterEntries = parseHeroCounterEntries(item.hero_counters);
  if (heroCounterEntries.length > 0) {
    document.getElementById('itemHeroCountersTitle').textContent = `被「${itemDisplayName}」克制的英雄`;
    document.getElementById('itemHeroCountersTitle').style.display = '';
    document.getElementById('itemHeroCountersGrid').style.display = '';
    renderHeroCounterGrid('itemHeroCountersGrid', heroCounterEntries);
  } else {
    document.getElementById('itemHeroCountersTitle').style.display = 'none';
    document.getElementById('itemHeroCountersGrid').style.display = 'none';
  }

  // counters_of = 当前物品克制的对象（被「本物品」克制的物品）
  const counteredByEntries = parseCounterEntries(item.counters_of);
  if (counteredByEntries.length > 0) {
    document.getElementById('itemCounteredByTitle').textContent = `被「${itemDisplayName}」克制的物品`;
    document.getElementById('itemCounteredByTitle').style.display = '';
    document.getElementById('itemCounteredByGrid').style.display = '';
    renderCounterGrid('itemCounteredByGrid', counteredByEntries);
  } else {
    document.getElementById('itemCounteredByTitle').style.display = 'none';
    document.getElementById('itemCounteredByGrid').style.display = 'none';
  }

  // counters = 克制当前物品的对象（克制「本物品」的物品）
  const counterEntries = parseCounterEntries(item.counters);
  if (counterEntries.length > 0) {
    document.getElementById('itemCountersTitle').textContent = `克制「${itemDisplayName}」的物品`;
    document.getElementById('itemCountersTitle').style.display = '';
    document.getElementById('itemCountersGrid').style.display = '';
    renderCounterGrid('itemCountersGrid', counterEntries);
  } else {
    document.getElementById('itemCountersTitle').style.display = 'none';
    document.getElementById('itemCountersGrid').style.display = 'none';
  }

  // 背景故事 lore
  if (item.lore_en || item.lore_zh) {
    document.getElementById('itemLoreTitle').style.display = '';
    document.getElementById('itemLoreCard').style.display = '';
    document.getElementById('itemLoreCard').innerHTML =
      (item.lore_en ? `<div class="item-lore-en">${item.lore_en}</div>` : '') +
      (item.lore_zh ? `<div class="item-lore-zh">${item.lore_zh}</div>` : '');
  } else {
    document.getElementById('itemLoreTitle').style.display = 'none';
    document.getElementById('itemLoreCard').style.display = 'none';
  }

  document.getElementById('itemsView').style.display = 'none';
  document.getElementById('itemDetailView').style.display = 'block';
  window.scrollTo(0, 0);
}

function backToItems() {
  document.getElementById('itemDetailView').style.display = 'none';
  document.getElementById('itemsView').style.display = '';
  activeItemKey = null;
}

function formatDesc(text, attrib) {
  return text
    .replace(/\\n/g, '<br>').replace(/\n/g, '<br>')
    .replace(/%([A-Za-z0-9_]+)%%%/g, (_, k) => {
      const v = attrib && attrib[k];
      return v != null ? `<b style="color:#c89b3c">${v}%</b>` : `<span style="color:#555">${k}%</span>`;
    })
    .replace(/%([A-Za-z0-9_]+)%/g, (_, k) => {
      const v = attrib && attrib[k];
      return v != null ? `<b style="color:#c89b3c">${v}</b>` : `<span style="color:#555">${k}</span>`;
    });
}

loadData();

// ════════════════════════════════════════════════
// 克制图谱 (D3 Force Graph)
// ════════════════════════════════════════════════

let graphInited = false;
let graphSimulation = null;
let graphSvgSel = null;
let graphG = null;          // main group (zoomed)
let graphZoomBehavior = null;
let graphCountersData = {}; // hero counters (countered_by)
let graphAllNodes = {};     // id -> node object
let graphAllEdges = [];     // full edge list
let graphActiveNodeIds = new Set();  // nodes currently shown
let graphLinkSel, graphNodeSel;

async function initGraph() {
  if (graphInited) return;
  graphInited = true;

  // Load hero counters data
  try {
    const r = await fetch('/api/graph_data');
    graphCountersData = await r.json();
  } catch(e) {
    console.error('Failed to load graph data', e);
    return;
  }

  buildGraphIndex();
  setupGraphSvg();
}

function buildGraphIndex() {
  graphAllNodes = {};
  graphAllEdges = [];

  // Hero nodes
  for (const [fullKey, h] of Object.entries(heroesData)) {
    const id = fullKey;
    graphAllNodes[id] = {
      id, type: 'hero',
      name: h.name || h.name_en,
      img: h.icon || h.img || '',
      attr: h.primary_attr,
      data: h,
    };
  }

  // Item nodes (only items that participate in counter relations)
  for (const [key, item] of Object.entries(itemsData)) {
    if (!item.name) continue;
    const hasRelations = (item.counters_of && item.counters_of.length) ||
                         (item.counters && item.counters.length) ||
                         (item.hero_counters && item.hero_counters.length);
    if (!hasRelations) continue;
    graphAllNodes[key] = {
      id: key, type: 'item',
      name: item.name || item.name_en,
      img: item.img || '',
      cost: item.cost,
      data: item,
    };
  }

  // Edges: hero -> hero (countered_by means "source counters target")
  for (const [shortKey, val] of Object.entries(graphCountersData)) {
    const targetId = `npc_dota_hero_${shortKey}`;
    for (const c of (val.countered_by || [])) {
      const sourceId = `npc_dota_hero_${c.key}`;
      if (graphAllNodes[sourceId] && graphAllNodes[targetId]) {
        graphAllEdges.push({
          source: sourceId, target: targetId,
          type: 'hero-hero',
          reason: (c.reasons || [])[0] || '',
          strength: c.strength || 'moderate',
        });
      }
    }
  }

  // Edges: item -> item (counters_of: items that counter this item)
  for (const [itemKey, item] of Object.entries(itemsData)) {
    for (const e of (item.counters_of || [])) {
      const src = e.counter || e;
      if (graphAllNodes[src] && graphAllNodes[itemKey]) {
        graphAllEdges.push({
          source: src, target: itemKey,
          type: 'item-item',
          reason: e.reason || '',
        });
      }
    }
    // item.counters: items that this item counters
    for (const e of (item.counters || [])) {
      const tgt = e.counter || e;
      if (graphAllNodes[itemKey] && graphAllNodes[tgt]) {
        graphAllEdges.push({
          source: itemKey, target: tgt,
          type: 'item-item',
          reason: e.reason || '',
        });
      }
    }
    // item -> hero
    for (const e of (item.hero_counters || [])) {
      const tgt = `npc_dota_hero_${e.hero}`;
      if (graphAllNodes[itemKey] && graphAllNodes[tgt]) {
        graphAllEdges.push({
          source: itemKey, target: tgt,
          type: 'item-hero',
          reason: e.reason || '',
        });
      }
    }
  }

  document.getElementById('graphEmpty').style.display = '';
}

function setupGraphSvg() {
  const svg = d3.select('#graphSvg');
  const width = document.getElementById('graphContainer').clientWidth;
  const height = document.getElementById('graphContainer').clientHeight;

  svg.selectAll('*').remove();

  // Arrow markers
  const defs = svg.append('defs');
  const mkArrow = (id, color) => {
    defs.append('marker')
      .attr('id', id)
      .attr('viewBox', '0 -5 10 10')
      .attr('refX', 22).attr('refY', 0)
      .attr('markerWidth', 6).attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-5L10,0L0,5')
      .attr('fill', color);
  };
  mkArrow('arrow-hero-hero', '#e05555');
  mkArrow('arrow-item-item', '#f5a623');
  mkArrow('arrow-item-hero', '#e05555');

  graphZoomBehavior = d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', (event) => {
      graphG.attr('transform', event.transform);
    });

  svg.call(graphZoomBehavior);
  graphG = svg.append('g');
  graphSvgSel = svg;

  // Simulation
  graphSimulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d => d.id).distance(d => {
      if (d.type === 'hero-hero') return 140;
      if (d.type === 'item-hero') return 120;
      return 100;
    }).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(28));

  // Empty containers
  graphG.append('g').attr('class', 'links-layer');
  graphG.append('g').attr('class', 'nodes-layer');

  svg.on('click', (event) => {
    if (event.target === svg.node()) {
      document.getElementById('graphNodeInfo').style.display = 'none';
    }
  });
}

function edgeId(e, side) {
  const v = e[side];
  return typeof v === 'object' && v !== null ? v.id : v;
}

function getNeighborIds(nodeId, depth = 1) {
  const visited = new Set([nodeId]);
  let frontier = [nodeId];
  for (let d = 0; d < depth; d++) {
    const next = [];
    for (const eid of graphAllEdges) {
      const src = edgeId(eid, 'source');
      const tgt = edgeId(eid, 'target');
      if (frontier.includes(src) && !visited.has(tgt)) {
        visited.add(tgt); next.push(tgt);
      }
      if (frontier.includes(tgt) && !visited.has(src)) {
        visited.add(src); next.push(src);
      }
    }
    frontier = next;
  }
  return visited;
}

function focusNode(nodeId) {
  document.getElementById('graphEmpty').style.display = 'none';
  const neighbors = getNeighborIds(nodeId, 1);
  graphActiveNodeIds = neighbors;
  redrawGraph(nodeId);
  showNodeInfo(nodeId);
}

function redrawGraph(centerNodeId) {
  const nodeIds = graphActiveNodeIds;
  const nodes = [...nodeIds].map(id => ({ ...graphAllNodes[id] }));

  const edgeMap = new Map(nodes.map(n => [n.id, true]));
  const links = graphAllEdges
    .filter(e => edgeMap.has(edgeId(e, 'source')) && edgeMap.has(edgeId(e, 'target')))
    .map(e => ({ ...e, source: edgeId(e, 'source'), target: edgeId(e, 'target') }));

  // Deduplicate links (keep only one direction for item-item to avoid loops)
  const seenLinks = new Set();
  const deduped = links.filter(e => {
    const k1 = `${e.source}|${e.target}`;
    const k2 = `${e.target}|${e.source}`;
    if (e.type === 'item-item' && (seenLinks.has(k1) || seenLinks.has(k2))) return false;
    seenLinks.add(k1);
    return true;
  });

  graphSimulation.stop();

  const linksLayer = graphG.select('.links-layer');
  const nodesLayer = graphG.select('.nodes-layer');

  linksLayer.selectAll('*').remove();
  nodesLayer.selectAll('*').remove();

  // Links
  const link = linksLayer.selectAll('.g-link')
    .data(deduped)
    .enter().append('path')
    .attr('class', d => `g-link ${d.type}`)
    .attr('marker-end', d => `url(#arrow-${d.type})`);

  // Nodes
  const node = nodesLayer.selectAll('.g-node')
    .data(nodes)
    .enter().append('g')
    .attr('class', d => `g-node${d.id === centerNodeId ? ' pinned' : ''}`)
    .call(d3.drag()
      .on('start', dragStarted)
      .on('drag', dragged)
      .on('end', dragEnded))
    .on('click', (event, d) => {
      event.stopPropagation();
      focusNode(d.id);
    });

  const ATTR_COLOR = { str: '#e05555', agi: '#6ec86e', int: '#6aacee', all: '#4fd6cc' };

  node.append('circle')
    .attr('r', d => d.id === centerNodeId ? 18 : 14)
    .attr('fill', d => {
      if (d.type === 'hero') return ATTR_COLOR[d.attr] || '#4a9eff';
      return '#f5a623';
    })
    .attr('stroke', d => d.id === centerNodeId ? '#fff' : (d.type === 'hero' ? '#2a5a99' : '#7a5010'));

  // Hero: icon image clipped to circle
  const heroNodes = node.filter(d => d.type === 'hero' && d.img);
  const defs = graphSvgSel.select('defs');

  heroNodes.each(function(d) {
    const r = d.id === centerNodeId ? 18 : 14;
    const clipId = `clip-${d.id.replace(/[^a-z0-9]/gi, '_')}`;
    defs.append('clipPath').attr('id', clipId)
      .append('circle').attr('r', r);
    d3.select(this).append('image')
      .attr('href', d.img)
      .attr('x', -r * 1.5).attr('y', -r)
      .attr('width', r * 3).attr('height', r * 2)
      .attr('clip-path', `url(#${clipId})`)
      .attr('preserveAspectRatio', 'xMidYMid slice');
  });

  // Item: icon image
  const itemNodes = node.filter(d => d.type === 'item' && d.img);
  itemNodes.each(function(d) {
    const r = d.id === centerNodeId ? 18 : 14;
    const clipId = `clip-${d.id.replace(/[^a-z0-9]/gi, '_')}`;
    defs.append('clipPath').attr('id', clipId)
      .append('circle').attr('r', r);
    d3.select(this).append('image')
      .attr('href', d.img)
      .attr('x', -r * 1.2).attr('y', -r)
      .attr('width', r * 2.4).attr('height', r * 2)
      .attr('clip-path', `url(#${clipId})`)
      .attr('preserveAspectRatio', 'xMidYMid slice');
  });

  node.append('text')
    .attr('class', 'g-node-label')
    .attr('y', d => (d.id === centerNodeId ? 18 : 14) + 13)
    .text(d => d.name);

  // Simulation
  graphSimulation.nodes(nodes).on('tick', () => {
    link.attr('d', linkArc);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  graphSimulation.force('link').links(deduped);
  graphSimulation.alpha(0.8).restart();

  // Center view
  const w = graphSvgSel.node().clientWidth;
  const h = graphSvgSel.node().clientHeight;
  graphSvgSel.transition().duration(400)
    .call(graphZoomBehavior.transform, d3.zoomIdentity.translate(w/2, h/2).scale(1));
}

function linkArc(d) {
  const dx = d.target.x - d.source.x;
  const dy = d.target.y - d.source.y;
  const dr = Math.sqrt(dx*dx + dy*dy);
  return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
}

function dragStarted(event, d) {
  if (!event.active) graphSimulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnded(event, d) {
  if (!event.active) graphSimulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

function showNodeInfo(nodeId) {
  const node = graphAllNodes[nodeId];
  if (!node) return;

  document.getElementById('graphNodeImg').src = node.img || '';
  document.getElementById('graphNodeName').textContent = node.name;
  document.getElementById('graphNodeSub').textContent =
    node.type === 'hero'
      ? `英雄 · ${node.attr ? ({str:'力量',agi:'敏捷',int:'智力',all:'全才'}[node.attr]||node.attr) : ''}`
      : `物品 · ${node.cost ? node.cost + ' 金币' : ''}`;

  // Build edge lists from/to this node
  const outEdges = graphAllEdges.filter(e => e.source === nodeId || e.source.id === nodeId);
  const inEdges = graphAllEdges.filter(e => e.target === nodeId || e.target.id === nodeId);

  let html = '';

  if (outEdges.length) {
    html += `<div class="graph-info-section">
      <div class="graph-info-section-title">被「${node.name}」克制</div>`;
    for (const e of outEdges.slice(0, 12)) {
      const tgtId = typeof e.target === 'object' ? e.target.id : e.target;
      const tgt = graphAllNodes[tgtId];
      if (!tgt) continue;
      html += `<div class="graph-info-row">
        <img src="${tgt.img}" onerror="this.style.opacity='.3'">
        <span class="info-name" onclick="focusNode('${tgtId}')">${tgt.name}</span>
        ${e.reason ? `<span class="info-reason">${e.reason.slice(0,30)}</span>` : ''}
      </div>`;
    }
    html += '</div>';
  }

  if (inEdges.length) {
    html += `<div class="graph-info-section">
      <div class="graph-info-section-title">克制「${node.name}」的</div>`;
    for (const e of inEdges.slice(0, 12)) {
      const srcId = typeof e.source === 'object' ? e.source.id : e.source;
      const src = graphAllNodes[srcId];
      if (!src) continue;
      html += `<div class="graph-info-row">
        <img src="${src.img}" onerror="this.style.opacity='.3'">
        <span class="info-name" onclick="focusNode('${srcId}')">${src.name}</span>
        ${e.reason ? `<span class="info-reason">${e.reason.slice(0,30)}</span>` : ''}
      </div>`;
    }
    html += '</div>';
  }

  if (!html) html = '<div style="color:#555;font-size:13px;padding:8px 0">暂无克制关系数据</div>';

  document.getElementById('graphNodeInfoBody').innerHTML = html;
  document.getElementById('graphNodeInfo').style.display = '';
}

// Search
let graphSearchTimeout = null;
function onGraphSearch() {
  clearTimeout(graphSearchTimeout);
  graphSearchTimeout = setTimeout(() => {
    const q = document.getElementById('graphSearchInput').value.trim().toLowerCase();
    const dd = document.getElementById('graphSearchDropdown');
    if (!q) { dd.classList.remove('open'); return; }

    const results = [];
    for (const [id, node] of Object.entries(graphAllNodes)) {
      if (node.name && node.name.toLowerCase().includes(q)) results.push(node);
      if (results.length >= 12) break;
    }

    if (!results.length) { dd.classList.remove('open'); return; }

    dd.innerHTML = results.map(n => `
      <div class="graph-dropdown-item" onclick="selectGraphNode('${n.id}')">
        <img src="${n.img}" onerror="this.style.opacity='.3'" alt="">
        <div>
          <div class="dd-name">${n.name}</div>
          <div class="dd-type">${n.type === 'hero' ? '英雄' : '物品'}</div>
        </div>
      </div>`).join('');
    dd.classList.add('open');
  }, 150);
}

function selectGraphNode(nodeId) {
  const node = graphAllNodes[nodeId];
  if (!node) return;
  document.getElementById('graphSearchInput').value = node.name;
  document.getElementById('graphSearchDropdown').classList.remove('open');
  focusNode(nodeId);
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.graph-search-wrap')) {
    document.getElementById('graphSearchDropdown')?.classList.remove('open');
  }
});

function graphZoomIn() {
  if (!graphSvgSel) return;
  graphSvgSel.transition().duration(250).call(graphZoomBehavior.scaleBy, 1.4);
}
function graphZoomOut() {
  if (!graphSvgSel) return;
  graphSvgSel.transition().duration(250).call(graphZoomBehavior.scaleBy, 0.7);
}
function graphReset() {
  if (!graphSvgSel) return;
  const w = graphSvgSel.node().clientWidth;
  const h = graphSvgSel.node().clientHeight;
  graphSvgSel.transition().duration(400)
    .call(graphZoomBehavior.transform, d3.zoomIdentity.translate(w/2, h/2).scale(1));
}

loadData();
