<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物品 - DOTA2 OldStack</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #1c1c1c;
  color: #e0e0e0;
  min-height: 100vh;
}

/* ── 顶部导航 ── */
header {
  background: #0e1015;
  border-bottom: 1px solid #1e2230;
  padding: 0 32px;
  display: flex;
  align-items: center;
  height: 60px;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

header .logo {
  font-size: 17px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 32px;
  flex-shrink: 0;
}

header .logo .logo-dota { color: #fff; }
header .logo .logo-brand { color: #e8471a; }

header .logo-icon {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
}

header nav {
  display: flex;
  align-items: stretch;
  height: 100%;
  margin: 0 auto;
  gap: 0;
}

header nav a {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 28px;
  height: 100%;
  color: #9aa3b5;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  border-bottom: 2px solid transparent;
  position: relative;
  cursor: pointer;
  transition: color .15s;
  white-space: nowrap;
}

header nav a .nav-icon {
  width: 20px;
  height: 20px;
  opacity: 0.6;
  flex-shrink: 0;
}

header nav a .nav-cn {
  font-weight: 600;
  font-size: 15px;
}

header nav a .nav-en {
  font-size: 13px;
  color: #8892a4;
}

header nav a:hover {
  color: #e0e0e0;
}

header nav a:hover .nav-en { color: #9aa3b5; }
header nav a:hover .nav-icon { opacity: 0.85; }

header nav a.active {
  color: #fff;
  background: rgba(255,255,255,0.04);
  border-bottom-color: #e8471a;
}

header nav a.active .nav-icon { opacity: 1; }
header nav a.active .nav-en { color: #c0c8d8; }

/* nav 分隔线 */
header nav .nav-sep {
  width: 1px;
  background: #1e2230;
  margin: 16px 0;
  align-self: stretch;
  flex-shrink: 0;
}

.version-badge {
  font-size: 12px;
  color: #8892a4;
  flex-shrink: 0;
}
.version-badge span { color: #4fc3f7; }

/* 旧的 header search — 隐藏，由英雄页搜索栏替代 */
.search-wrap { display: none; }

/* ── 主内容 ── */
main { padding: 0 32px 48px; max-width: 1400px; margin: 0 auto; }

/* ── 属性分组 ── */
.attr-section {
  margin-bottom: 24px;
  background: #161b22;
  border-radius: 12px;
  padding: 16px;
  border: 1px solid rgba(255,255,255,0.07);
}

.attr-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.attr-header .attr-icon {
  width: 26px;
  height: 26px;
  object-fit: contain;
}

.attr-header .attr-label {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}

.attr-header .attr-hero-count {
  margin-left: auto;
  font-size: 12px;
  color: #888;
}
.attr-header .attr-hero-count b {
  color: #ccc;
  font-weight: 600;
}

/* 属性边框色 */
.attr-str { border-color: rgba(224, 85, 85, 0.3); }
.attr-agi { border-color: rgba(110, 200, 110, 0.3); }
.attr-int { border-color: rgba(106, 172, 238, 0.3); }
.attr-all { border-color: rgba(79, 214, 204, 0.3); }

.attr-str .attr-header .attr-label { color: #e05555; }
.attr-agi .attr-header .attr-label { color: #6ec86e; }
.attr-int .attr-header .attr-label { color: #6aacee; }
.attr-all .attr-header .attr-label { color: #4fd6cc; }

/* ── 行容器 ── */
.hero-rows { display: flex; flex-direction: column; gap: 20px; }

/* ── 两栏布局 ── */
.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}

/* ── 英雄网格 ── */
.hero-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

/* ── 英雄卡片 ── */
.hero-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.08);
  transition: border-color .18s, transform .18s;
  display: flex;
  flex-direction: column;
}

.hero-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.25);
}

.attr-str .hero-card:hover { border-color: rgba(224, 85, 85, 0.7); }
.attr-agi .hero-card:hover { border-color: rgba(110, 200, 110, 0.7); }
.attr-int .hero-card:hover { border-color: rgba(106, 172, 238, 0.7); }
.attr-all .hero-card:hover { border-color: rgba(79, 214, 204, 0.7); }

.hero-card-portrait {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 4;
  overflow: hidden;
  background: #111;
}

.hero-card-portrait img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
  transition: transform .22s ease;
}

.hero-card:hover .hero-card-portrait img { transform: scale(1.07); }

.hero-card-info {
  padding: 6px 7px 7px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: #0d1117;
}

.hero-card .hero-name {
  font-size: 12px;
  font-weight: 600;
  color: #e8e8e8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}

.hero-card:hover .hero-name { color: #ffe082; }

.hero-card-role {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  color: #fff;
  align-self: flex-start;
  line-height: 1.6;
}

.role-carry    { background: #1a3a5c; color: #5ab4f5; }
.role-support  { background: #1a3a2a; color: #5ad48a; }
.role-disabler { background: #2e1a3a; color: #b07ae0; }
.role-initiator{ background: #3a2a10; color: #e0a060; }
.role-nuker    { background: #3a1a1a; color: #e06060; }
.role-durable  { background: #1a2e3a; color: #60b0e0; }
.role-escape   { background: #2a3a1a; color: #90d060; }
.role-pusher   { background: #3a2e1a; color: #d0b060; }
.role-jungle   { background: #1a3a1a; color: #60d060; }
.role-default  { background: #252525; color: #aaa; }

/* ── 详情页 ── */
#detailView { display: none; }

/* Banner: full-bleed art with left fade, title bottom-left, stat cards top-right */
.detail-hero-banner {
  position: relative;
  height: 340px;
  overflow: hidden;
  background: #08090f;
}

.detail-hero-banner img.banner-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: brightness(0.55) saturate(1.1);
}

.detail-hero-banner::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to right, rgba(8,9,15,0.92) 0%, rgba(8,9,15,0.5) 45%, rgba(8,9,15,0.0) 75%),
    linear-gradient(to bottom, rgba(8,9,15,0) 40%, rgba(8,9,15,0.85) 100%);
  pointer-events: none;
  z-index: 1;
}

.detail-back {
  position: absolute;
  top: 16px;
  left: 20px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 6px;
  color: #aab0c4;
  font-size: 12px;
  padding: 6px 14px;
  cursor: pointer;
  transition: background .15s, color .15s;
  z-index: 10;
  backdrop-filter: blur(4px);
}
.detail-back:hover { background: rgba(0,0,0,0.75); color: #fff; }

/* Banner title block — bottom-left */
.banner-title-block {
  position: absolute;
  bottom: 28px;
  left: 28px;
  z-index: 5;
  max-width: 460px;
}
.banner-en-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #c89b3c;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.banner-en-label::before {
  content: '';
  display: inline-block;
  width: 22px;
  height: 2px;
  background: #c89b3c;
  border-radius: 1px;
}
.banner-hero-icon {
  width: 72px;
  height: 72px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.18);
  object-fit: cover;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  margin-bottom: 10px;
  display: block;
}
.banner-cn-name {
  font-size: 48px;
  font-weight: 900;
  color: #fff;
  line-height: 1.0;
  letter-spacing: -1.5px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  margin-bottom: 8px;
}
.banner-sub-line {
  font-size: 13px;
  color: #8892a4;
  letter-spacing: 0.3px;
}
.banner-sub-line .sep { margin: 0 5px; color: #6b7590; }

/* Banner stat cards — top right */
.banner-stat-cards {
  position: absolute;
  top: 40px;
  right: 28px;
  z-index: 5;
  display: flex;
  gap: 10px;
}
.banner-stat-card {
  background: rgba(13,16,26,0.82);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 14px 18px 16px;
  min-width: 110px;
  backdrop-filter: blur(6px);
}
.banner-stat-label {
  font-size: 11px;
  color: #8892a4;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.banner-stat-value {
  font-size: 22px;
  font-weight: 800;
  color: #e8eaf0;
  line-height: 1.1;
  margin-bottom: 4px;
}
.banner-stat-sub {
  font-size: 11px;
  color: #9aa3b5;
}

/* ── 详情页 Tab 栏 ── */
.detail-tabs {
  background: #0e1015;
  border-bottom: 2px solid #1a1f2e;
  display: flex;
  justify-content: center;
  gap: 0;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 20;
}
.detail-tab-btn {
  padding: 18px 40px;
  font-size: 16px;
  font-weight: 600;
  color: #6b7590;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color .15s, border-color .15s;
  user-select: none;
  white-space: nowrap;
  letter-spacing: 0.5px;
}
.detail-tab-btn:hover { color: #c8cede; }
.detail-tab-btn.active { color: #fff; border-bottom-color: #e07830; font-weight: 700; }

/* ── 详情页 Tab 内容面板 ── */
.detail-tab-panel { display: none; }
.detail-tab-panel.active { display: block; }

.detail-body {
  max-width: 1080px;
  margin: 0 auto;
  padding: 24px 28px 60px;
}

/* ── 概览 Tab 两栏布局 ── */
.overview-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 16px;
  align-items: start;
}

/* 左侧：大图 + 标签 + 难度 */
.overview-portrait-card {
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
}
.overview-portrait-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  object-position: top center;
  display: block;
  filter: brightness(0.9) saturate(1.05);
}
.overview-portrait-footer {
  padding: 14px 16px 16px;
  background: #13161e;
}
.overview-role-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.overview-role-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  color: #8892a4;
  border: 1px solid rgba(255,255,255,0.08);
}
.overview-difficulty {
  font-size: 11px;
  color: #8892a4;
  margin-bottom: 6px;
}
.overview-diff-bar {
  height: 4px;
  background: #1a1f2e;
  border-radius: 2px;
  overflow: hidden;
}
.overview-diff-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .4s;
}

/* 右侧：概览面板 */
.overview-main-card {
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 14px;
  padding: 22px 24px 24px;
}
.overview-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #c89b3c;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.overview-section-label::before {
  content: '';
  display: inline-block;
  width: 18px;
  height: 2px;
  background: #c89b3c;
  border-radius: 1px;
}
.overview-hype-title {
  font-size: 22px;
  font-weight: 800;
  color: #e8eaf0;
  line-height: 1.3;
  margin-bottom: 16px;
}
.overview-attr-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  float: right;
  margin-top: -2px;
}
.overview-attr-badge.str { background: rgba(224,85,85,.18); color: #e05555; border: 1px solid rgba(224,85,85,.3); }
.overview-attr-badge.agi { background: rgba(110,200,110,.18); color: #6ec86e; border: 1px solid rgba(110,200,110,.3); }
.overview-attr-badge.int { background: rgba(106,172,238,.18); color: #6aacee; border: 1px solid rgba(106,172,238,.3); }
.overview-attr-badge.all { background: rgba(79,214,204,.18); color: #4fd6cc; border: 1px solid rgba(79,214,204,.3); }

/* 数据表 + 评分框并排 */
.overview-data-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  margin-bottom: 16px;
  align-items: start;
}
.overview-info-table {
  background: #0a0c14;
  border: 1px solid #1a1f2e;
  border-radius: 8px;
  overflow: hidden;
}
.overview-info-row {
  display: flex;
  align-items: baseline;
  padding: 11px 16px;
  border-bottom: 1px solid #131720;
  font-size: 15px;
}
.overview-info-row:last-child { border-bottom: none; }
.overview-info-label {
  width: 80px;
  flex-shrink: 0;
  color: #9aa3b5;
  font-size: 13px;
}
.overview-info-value { color: #dde0eb; font-weight: 600; }

.overview-score-boxes {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.overview-score-box {
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 10px;
  padding: 10px 16px 12px;
  min-width: 90px;
  text-align: center;
  border-top: 2px solid var(--score-accent, #4a9eff);
}
.overview-score-label {
  font-size: 11px;
  color: #8892a4;
  margin-bottom: 4px;
}
.overview-score-value {
  font-size: 28px;
  font-weight: 800;
  color: #e8eaf0;
  line-height: 1.0;
  margin-bottom: 6px;
}
.overview-score-bar {
  height: 3px;
  background: #1a1f2e;
  border-radius: 2px;
  overflow: hidden;
}
.overview-score-fill {
  height: 100%;
  background: #4a9eff;
  border-radius: 2px;
}

/* hype 段落 */
.overview-hype-text {
  font-size: 13px;
  color: #b0b8cc;
  line-height: 1.8;
  margin-bottom: 16px;
}
.overview-hype-text b { color: #c89b3c; font-weight: 600; }

/* 底部两个子卡 */
.overview-bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 4px;
}
.overview-sub-card {
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 14px;
  padding: 14px 16px;
  overflow: hidden;
}
.overview-sub-card-title {
  font-size: 14px;
  font-weight: 700;
  color: #c8cede;
  letter-spacing: 0;
  margin-bottom: 12px;
}
.overview-skill-icons {
  display: flex;
  gap: 8px;
}
.overview-skill-icon {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  background: #1a1f2e;
  border: 1px solid #2a3050;
  object-fit: cover;
  overflow: hidden;
  position: relative;
}
.overview-skill-key {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  background: linear-gradient(135deg, #8b2020 0%, #5a1010 100%);
  border: 1px solid rgba(200,80,80,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0;
  flex-shrink: 0;
}
.overview-item-icons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.overview-item-icon {
  width: 40px;
  height: 30px;
  border-radius: 5px;
  object-fit: cover;
  background: #1a1f2e;
  border: 1px solid #2a3050;
}

/* ── Card-based design system ── */
.d-card {
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 14px;
  margin-bottom: 16px;
  overflow: hidden;
}
.d-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 14px;
  border-bottom: 1px solid #1a1f2e;
}
.d-card-title {
  font-size: 14px;
  font-weight: 700;
  color: #c8cede;
  display: flex;
  align-items: center;
  gap: 8px;
}
.d-card-title .d-card-icon {
  font-size: 15px;
  opacity: 0.8;
}
.d-card-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  color: #6b7590;
  border: 1px solid rgba(255,255,255,0.08);
}
.d-card-body {
  padding: 16px 20px 20px;
}
/* accent variants */
.d-card.accent-blue  { border-top: 2px solid #4a9eff; }
.d-card.accent-red   { border-top: 2px solid #e05555; }
.d-card.accent-green { border-top: 2px solid #6ec86e; }
.d-card.accent-gold  { border-top: 2px solid #c89b3c; }
.d-card.accent-teal  { border-top: 2px solid #4fd6cc; }

/* ── 英雄基本信息卡 (旧式，保留用于其他可能引用) ── */
.hero-intro-card { display: none; }
.hero-intro-avatar { display: none; }
.hero-intro-rows { display: none; }
.hero-intro-row { display: none; }
.hero-intro-label { display: none; }
.hero-intro-value { display: none; }

.detail-tags { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }

.tag {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.tag-str { background: rgba(224,85,85,.15); color: #e05555; border: 1px solid rgba(224,85,85,.3); }
.tag-agi { background: rgba(110,200,110,.15); color: #6ec86e; border: 1px solid rgba(110,200,110,.3); }
.tag-int { background: rgba(106,172,238,.15); color: #6aacee; border: 1px solid rgba(106,172,238,.3); }
.tag-all { background: rgba(79,214,204,.15); color: #4fd6cc; border: 1px solid rgba(79,214,204,.3); }
.tag-melee { background: rgba(180,100,50,.15); color: #e0934e; border: 1px solid rgba(180,100,50,.3); }
.tag-ranged { background: rgba(50,150,200,.15); color: #5bb8e8; border: 1px solid rgba(50,150,200,.3); }
.tag-role { background: rgba(255,255,255,.05); color: #8892a4; border: 1px solid rgba(255,255,255,.08); }

.section-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #a0aec0;
  border-bottom: 1px solid #1a1f2e;
  padding-bottom: 12px;
  margin-bottom: 18px;
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 16px;
  background: #4fc3f7;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── 技能列表 ── */
.ability-list { display: flex; flex-direction: column; gap: 10px; }
.ability-group { display: flex; flex-direction: column; gap: 0; }

.ability-card {
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 10px;
  padding: 16px 18px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  transition: border-color .15s;
}

.ability-card:hover { border-color: #2a3050; }

.ability-group .ability-card:first-child:not(:last-child) {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
  border-bottom-color: transparent;
}

.ability-group .ability-card + .ability-card {
  border-top-left-radius: 0;
  border-top-right-radius: 0;
  border-top: 1px solid #0e1015;
}

.ability-card.upgrade-scepter {
  background: #111e14;
  border-color: rgba(100,200,100,.3);
}
.ability-card.upgrade-scepter:hover { border-color: rgba(100,200,100,.55); }

.ability-card.upgrade-shard {
  background: #111520;
  border-color: rgba(120,160,240,.3);
}
.ability-card.upgrade-shard:hover { border-color: rgba(120,160,240,.55); }

.ability-card.grant-scepter { background: #111e14; border-color: rgba(100,200,100,.35); }
.ability-card.grant-shard   { background: #111520; border-color: rgba(120,160,240,.35); }
.ability-card.is-innate { border-color: rgba(220,180,60,.25); }
.ability-card.is-innate:hover { border-color: rgba(220,180,60,.5); }

.ability-card .ab-content { flex: 1; min-width: 0; }

.ability-card .ab-name {
  font-size: 15px;
  font-weight: 700;
  color: #e8eaf0;
  margin-bottom: 6px;
  line-height: 1.2;
}

.ability-card .ab-desc {
  font-size: 13px;
  color: #b0b8cc;
  line-height: 1.7;
  margin-bottom: 10px;
}

.ability-card .ab-stats {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: #9aa3b5;
}

.ability-card .ab-stats b { color: #c89b3c; }

.upgrade-scepter .ab-desc { color: #7ec88e; }
.upgrade-shard .ab-desc   { color: #7ab0ef; }

.ab-grant-label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.ab-grant-label.scepter { background: rgba(100,200,100,.1); color: #6dc86e; border: 1px solid rgba(100,200,100,.3); }
.ab-grant-label.shard   { background: rgba(120,160,240,.12); color: #7db4f0; border: 1px solid rgba(120,160,240,.35); }

.ab-badge-innate {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  background: rgba(220,180,60,.12);
  color: #e8c840;
  border: 1px solid rgba(220,180,60,.35);
  margin-bottom: 8px;
}

.ab-img-wrap {
  position: relative;
  width: 54px;
  height: 54px;
  flex-shrink: 0;
}

.ab-img-wrap img.ab-main-img {
  width: 54px;
  height: 54px;
  border-radius: 8px;
  object-fit: cover;
  background: #0d1117;
  display: block;
  border: 1px solid #1e2535;
}

.ab-overlay-icons {
  position: absolute;
  bottom: 2px;
  right: 2px;
  display: flex;
  flex-direction: column-reverse;
  gap: 2px;
  align-items: flex-end;
  z-index: 2;
}

.ab-overlay-icon {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  object-fit: contain;
  background: rgba(10,10,20,0.8);
  padding: 1px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.12);
}

/* counter / synergy cards in hero detail */
.counter-strength-badge, .synergy-strength-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}
.counter-strength-badge.strong   { background: rgba(224,85,85,.15); color: #e05555; border: 1px solid rgba(224,85,85,.3); }
.counter-strength-badge.moderate { background: rgba(180,120,60,.15); color: #e0a060; border: 1px solid rgba(180,120,60,.3); }
.synergy-strength-badge.strong { background: rgba(110,200,110,.15); color: #6ec86e; border: 1px solid rgba(110,200,110,.3); }
.synergy-strength-badge.good   { background: rgba(79,180,150,.15); color: #4fd6a0; border: 1px solid rgba(79,180,150,.3); }

/* 物品页顶部标签 */

/* 物品页搜索栏 */
/* ── 物品页搜索栏 ── */
.items-search-bar {
  padding: 16px 32px;
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
  display: flex;
  align-items: center;
}
.items-search-bar-inner {
  position: relative;
  flex: 0 0 280px;
}
.items-search-bar-inner input {
  width: 100%;
  background: #13161e;
  border: 1px solid #2a2f3e;
  border-radius: 8px;
  color: #d0d4de;
  font-size: 14px;
  padding: 9px 14px 9px 38px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.items-search-bar-inner input::placeholder { color: #6b7590; }
.items-search-bar-inner input:focus {
  border-color: #3a4460;
  box-shadow: 0 0 0 2px rgba(79,130,247,.12);
}
.items-search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: #6b7590;
  pointer-events: none;
  display: flex;
  align-items: center;
}
.items-search-clear {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #8892a4;
  cursor: pointer;
  font-size: 13px;
  padding: 2px 4px;
  line-height: 1;
  transition: color .12s;
}
.items-search-clear:hover { color: #aaa; }

/* ── 分类 Tab 栏 ── */
.items-tab-bar {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 32px 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.items-tab-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: #13161e;
  border: 1px solid #2a2f3e;
  border-radius: 8px;
  color: #8892a4;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
  white-space: nowrap;
  user-select: none;
}

.items-tab-btn .tab-icon {
  font-size: 15px;
  line-height: 1;
}

.items-tab-btn .tab-cn { font-weight: 600; }
.items-tab-btn .tab-en { font-size: 11px; color: #8892a4; }

.items-tab-btn:hover {
  background: #1a1f2e;
  border-color: #3a4460;
  color: #c0c8d8;
}

.items-tab-btn.active {
  background: #1e2540;
  border-color: #e8471a;
  color: #fff;
}
.items-tab-btn.active .tab-en { color: #c0c8d8; }

/* ── 物品页主体 ── */
.items-body {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 32px 48px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.items-body.search-mode { gap: 0; }

/* 分类区块 */
.item-category {
  min-width: 0;
}

.item-category-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
}

.item-category-icon { font-size: 18px; }

.item-category-cn {
  font-size: 16px;
  font-weight: 700;
  color: #e0e4ee;
}

.item-category-en {
  font-size: 13px;
  color: #8892a4;
}

/* 中立物品分组 */
.neutral-tier-group { margin-bottom: 18px; }
.neutral-tier-label {
  font-size: 11px;
  font-weight: 700;
  color: #c89b3c;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* ── 物品卡片网格 ── */
.item-icon-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.item-icon-btn {
  width: 86px;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid #2a2f3e;
  background: #0d1117;
  position: relative;
  transition: border-color .15s, transform .15s, box-shadow .15s;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

.item-icon-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  z-index: 2;
}

/* 分类颜色边框 */
.item-icon-btn.color-green  { border-color: #2d5a2d; }
.item-icon-btn.color-green:hover  { border-color: #4a9a4a; }
.item-icon-btn.color-blue   { border-color: #1e3a5f; }
.item-icon-btn.color-blue:hover   { border-color: #3a7abf; }
.item-icon-btn.color-purple { border-color: #3d1f5a; }
.item-icon-btn.color-purple:hover { border-color: #7a3fbf; }
.item-icon-btn.color-gold   { border-color: #5a4010; }
.item-icon-btn.color-gold:hover   { border-color: #c89b3c; }
.item-icon-btn.color-teal   { border-color: #1a4040; }
.item-icon-btn.color-teal:hover   { border-color: #3a9090; }

.item-icon-btn .item-img-wrap {
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: #111;
}

.item-icon-btn img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .2s ease;
}

.item-icon-btn:hover img { transform: scale(1.08); }

.item-icon-btn .item-icon-name {
  font-size: 11px;
  font-weight: 500;
  color: #b0b8cc;
  text-align: center;
  padding: 4px 4px 5px;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: #0d1117;
}

.item-icon-btn:hover .item-icon-name { color: #fff; }

/* 搜索结果列表 */
.item-search-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}

.item-card {
  background: #13161e;
  border: 1px solid #2a2f3e;
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}

.item-card:hover { border-color: #3a4460; background: #1a1f2e; }

.item-card img {
  width: 48px;
  height: 36px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
  background: #111;
}

.item-card .item-info { flex: 1; min-width: 0; }
.item-card .item-name { font-size: 12px; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-card .item-cost { font-size: 11px; color: #c89b3c; margin-top: 2px; }

/* ── 物品详情全页面 ── */
#itemDetailView { display: none; }

.item-detail-banner {
  position: relative;
  height: 220px;
  overflow: hidden;
  background: #0a0c14;
  display: flex;
  align-items: flex-end;
}

.item-detail-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(10,12,20,0.95) 0%, rgba(20,25,40,0.7) 50%, rgba(10,12,20,0.4) 100%);
  z-index: 1;
  pointer-events: none;
}

.item-detail-banner .item-detail-banner-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 80px;
  opacity: 0.12;
  pointer-events: none;
}

.item-detail-banner .item-detail-banner-bg img {
  width: 280px;
  height: 200px;
  object-fit: contain;
  filter: blur(3px) brightness(1.3) saturate(1.5);
}

.item-detail-banner .item-banner-info {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: flex-end;
  gap: 22px;
  padding: 0 36px 28px;
}

.item-detail-banner .item-banner-icon {
  width: 96px;
  height: 70px;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.18);
  object-fit: cover;
  flex-shrink: 0;
  background: #111;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

.item-detail-banner .item-banner-title h1 {
  font-size: 40px;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 2px 16px rgba(0,0,0,0.9);
  line-height: 1.05;
  letter-spacing: -0.8px;
}

.item-detail-banner .item-banner-title .item-banner-en {
  font-size: 13px;
  color: #9aa3b5;
  margin-top: 4px;
  letter-spacing: 0.5px;
}

.item-detail-banner .item-banner-title .item-banner-cost {
  font-size: 15px;
  color: #c89b3c;
  font-weight: 700;
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.item-detail-back {
  position: absolute;
  top: 18px;
  left: 24px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  color: #b0b8cc;
  font-size: 13px;
  padding: 7px 16px;
  cursor: pointer;
  transition: background .15s, color .15s;
  z-index: 10;
  backdrop-filter: blur(4px);
}
.item-detail-back:hover { background: rgba(0,0,0,0.8); color: #fff; }

/* item detail tabs reuse .detail-tabs / .detail-tab-btn / .detail-tab-panel */

.item-detail-body {
  max-width: 1000px;
  margin: 0 auto;
  padding: 28px 32px 56px;
}

.item-info-card {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 24px;
  align-items: start;
  padding: 20px 20px 4px;
}

.item-info-img {
  width: 120px;
  height: 88px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  background: #0d1117;
  border: 1px solid #2a2f3e;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}

.item-info-rows {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.item-info-row {
  display: flex;
  align-items: baseline;
  padding: 9px 0;
  border-bottom: 1px solid #1a1f2e;
  font-size: 14px;
  line-height: 1.6;
}

.item-info-row:last-child { border-bottom: none; }

.item-info-label {
  width: 84px;
  flex-shrink: 0;
  color: #9aa3b5;
  font-size: 13px;
  font-weight: 500;
}

.item-info-value { color: #dde0eb; font-weight: 600; flex: 1; }
.item-info-value.cost-val { color: #c89b3c; font-weight: 700; font-size: 17px; }

/* desc card lives inside d-card now — strip its own chrome */
.item-desc-card {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0;
  font-size: 14px;
  color: #b0b8cc;
  line-height: 1.9;
  margin-bottom: 0;
}

.item-desc-card h1 {
  font-size: 11px;
  color: #9aa3b5;
  margin-bottom: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.item-desc-card h1::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 11px;
  background: #4fc3f7;
  border-radius: 2px;
}

.item-desc-card h1:not(:first-child) { margin-top: 20px; }

/* lore lives inside d-card — strip its own chrome */
.item-lore-card { display: none; } /* replaced by d-card wrapper in HTML */

.item-lore-en {
  font-size: 13px;
  color: #8892a4;
  line-height: 1.85;
  font-style: italic;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid #1a1f2e;
}

.item-lore-zh {
  font-size: 15px;
  color: #c0c8d8;
  line-height: 1.9;
}

/* 克制物品 */
.item-counters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

.item-counter-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .15s;
}

.item-counter-card:hover {
  border-color: rgba(224,85,85,.5);
  background: #1a1318;
  transform: translateY(-1px);
}

#itemCounteredByGrid .item-counter-card:hover {
  border-color: rgba(110,200,110,.5);
  background: #131a14;
}

#itemCounteredByGrid .counter-reason { color: #6ec86e; }

.item-counter-card img {
  width: 62px;
  height: 46px;
  border-radius: 6px;
  object-fit: cover;
  border: 1px solid #2a2f3e;
  flex-shrink: 0;
  background: #0d1117;
}

.item-counter-card .counter-info { flex: 1; min-width: 0; }
.item-counter-card .counter-name { font-size: 14px; font-weight: 600; color: #dde0eb; }
.item-counter-card .counter-cost { font-size: 12px; color: #c89b3c; margin-top: 3px; }
.item-counter-card .counter-reason { font-size: 12px; color: #e07070; margin-top: 5px; line-height: 1.5; }

/* 克制英雄 */
.item-hero-counters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.item-hero-counter-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 10px;
  padding: 11px 14px;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .15s;
}

.item-hero-counter-card:hover {
  border-color: rgba(106,172,238,.5);
  background: #131620;
  transform: translateY(-1px);
}

.item-hero-counter-card img {
  width: 54px;
  height: 32px;
  border-radius: 5px;
  object-fit: cover;
  border: 1px solid #2a2f3e;
  flex-shrink: 0;
}

.item-hero-counter-card .hero-counter-info { flex: 1; min-width: 0; }
.item-hero-counter-card .hero-counter-name { font-size: 14px; font-weight: 600; color: #dde0eb; }
.item-hero-counter-card .hero-counter-reason { font-size: 12px; color: #6aacee; margin-top: 4px; line-height: 1.5; }

/* 适合出装英雄 */
.item-hero-fits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.item-hero-fit-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 10px;
  padding: 11px 14px;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .15s;
}

.item-hero-fit-card:hover {
  border-color: rgba(110,200,110,.5);
  background: #131a14;
  transform: translateY(-1px);
}

.item-hero-fit-card img {
  width: 54px;
  height: 32px;
  border-radius: 5px;
  object-fit: cover;
  border: 1px solid #2a2f3e;
  flex-shrink: 0;
}

.item-hero-fit-card .hero-fit-info { flex: 1; min-width: 0; }
.item-hero-fit-card .hero-fit-name { font-size: 14px; font-weight: 600; color: #dde0eb; }
.item-hero-fit-card .hero-fit-reason { font-size: 12px; color: #6ec86e; margin-top: 4px; line-height: 1.5; }

.item-stats-row {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid #1a1f2e;
  font-size: 13px;
}

.item-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #9aa3b5;
}

.item-stat b { color: #d0d4de; }

/* 属性加成网格 */
.item-bonuses-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}

.item-bonus-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #13161e;
  border: 1px solid #1e2535;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
}

.item-bonus-val {
  font-weight: 700;
  font-size: 16px;
  min-width: 48px;
  text-align: right;
  flex-shrink: 0;
}

.item-bonus-val.pos { color: #6ec86e; }
.item-bonus-val.neg { color: #e05555; }

.item-bonus-label { color: #b0b8cc; flex: 1; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #6b7590;
  font-size: 14px;
}

/* 无搜索结果 */
.search-empty { display: none; text-align: center; padding: 48px; color: #6b7590; font-size: 14px; }

/* ── 克制图谱 ── */
#graphView {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px);
  overflow: hidden;
  background: #0a0c12;
}

/* ── 工具栏 ── */
.graph-toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 24px;
  background: #0e1015;
  border-bottom: 1px solid #1e2230;
  flex-shrink: 0;
}

.graph-search-wrap {
  position: relative;
  flex: 1;
  min-width: 260px;
  max-width: 480px;
  margin: 0 auto;
}

.graph-search-wrap input {
  width: 100%;
  background: #13161e;
  border: 1px solid #2a2f3e;
  border-radius: 8px;
  color: #d0d4de;
  font-size: 14px;
  padding: 9px 38px 9px 38px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}

.graph-search-wrap input::placeholder { color: #6b7590; }
.graph-search-wrap input:focus {
  border-color: #3a4460;
  box-shadow: 0 0 0 2px rgba(79,130,247,.12);
}

.graph-search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: #6b7590;
  pointer-events: none;
  display: flex;
  align-items: center;
}

.graph-search-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  width: 100%;
  background: #1a1f2e;
  border: 1px solid #2a3050;
  border-radius: 8px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 200;
  display: none;
  box-shadow: 0 8px 28px rgba(0,0,0,.6);
}

.graph-search-dropdown.open { display: block; }

.graph-dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid #1e2535;
  transition: background .1s;
}

.graph-dropdown-item:last-child { border-bottom: none; }
.graph-dropdown-item:hover { background: #222840; }

.graph-dropdown-item img {
  width: 38px;
  height: 26px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid #2a3050;
  flex-shrink: 0;
}

.graph-dropdown-item .dd-name { font-weight: 600; color: #d0d4de; }
.graph-dropdown-item .dd-type { font-size: 11px; color: #9aa3b5; margin-top: 1px; }

/* 图例 */
.graph-legend {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #9aa3b5;
  flex-shrink: 0;
  white-space: nowrap;
}

.legend-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-arrow { font-size: 13px; font-weight: bold; }

/* 缩放控件 */
.graph-controls {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.graph-controls button {
  background: #13161e;
  border: 1px solid #2a2f3e;
  color: #b0b8cc;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: background .12s, color .12s, border-color .12s;
}

.graph-controls button:hover {
  background: #1a1f2e;
  border-color: #3a4460;
  color: #d0d4de;
}

/* ── 左右分栏主体 ── */
.graph-split {
  flex: 1;
  display: flex;
  gap: 16px;
  padding: 16px 20px;
  overflow: hidden;
  min-height: 0;
}

.graph-split-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  background: #0f1320;
  border-radius: 12px;
  border: 1px solid #1e2535;
}

/* 面板标题栏 */
.graph-panel-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px 12px;
  border-bottom: 1px solid #1e2535;
  flex-shrink: 0;
}

.graph-panel-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.graph-panel-icon.counter-icon { background: rgba(224,85,85,.15); color: #e05555; }
.graph-panel-icon.synergy-icon { background: rgba(110,200,110,.15); color: #6ec86e; }

.graph-panel-titles { flex: 1; min-width: 0; }

.graph-panel-cn {
  font-size: 15px;
  font-weight: 700;
  color: #e8eaf0;
  display: inline;
}

.graph-panel-en {
  font-size: 12px;
  color: #8892a4;
  margin-left: 8px;
  display: inline;
}

/* 面板内 Tab（克制我 / 我克制；最佳搭档 / 常见搭配） */
.graph-panel-tabs {
  display: flex;
  gap: 0;
  margin-left: auto;
  background: #131825;
  border-radius: 6px;
  padding: 2px;
  flex-shrink: 0;
}

.graph-panel-tab {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: #6b7280;
  cursor: pointer;
  border-radius: 5px;
  transition: background .15s, color .15s;
  white-space: nowrap;
}

.graph-panel-tab:hover { color: #b0b8cc; }
.graph-panel-tab.active { background: #1e2540; color: #e0e4ee; }

/* 分隔线（两面板之间空隙用 gap 已处理） */
.graph-split-divider { display: none; }

/* 图谱画布容器 */
.graph-split-container,
.graph-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at 50% 40%, #141a2e 0%, #0a0c14 65%);
  min-height: 0;
}

.graph-container {
  flex: 1;
  border-radius: 0 0 12px 12px;
}

#graphSvg, #graphCounterSvg, #graphSynergySvg {
  width: 100%;
  height: 100%;
  display: block;
}

/* 单节点/物品模式容器 */
.graph-single-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
  background: #0f1320;
  border-radius: 12px;
  border: 1px solid #1e2535;
  margin: 16px 20px;
}

.graph-single-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px 12px;
  border-bottom: 1px solid #1e2535;
  flex-shrink: 0;
}

.graph-single-title {
  font-size: 15px;
  font-weight: 700;
  color: #e8eaf0;
}

/* ── Hero picker grid ── */
.graph-hero-picker {
  flex-shrink: 0;
  padding: 12px 20px 0;
  background: #0a0c12;
  border-bottom: 1px solid #1a1f2e;
}
.graph-hero-picker-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding-bottom: 12px;
}
.graph-hero-avatar {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .15s, transform .1s;
  flex-shrink: 0;
}
.graph-hero-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.graph-hero-avatar:hover { border-color: #3a5080; transform: scale(1.1); }
.graph-hero-avatar.selected { border-color: #e07830; }

.graph-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #6b7590;
  font-size: 15px;
  text-align: center;
  pointer-events: none;
  line-height: 2;
  gap: 8px;
}

.graph-empty-icon {
  font-size: 40px;
  opacity: 0.3;
  margin-bottom: 4px;
}

/* SVG elements */
.g-link {
  stroke-opacity: 0.55;
  stroke-width: 1.5;
  fill: none;
  marker-end: url(#arrow);
}

.g-link.item-hero { stroke: #e05555; stroke-dasharray: 4 2; }
.g-link.item-item { stroke: #f5a623; }
.g-link.hero-hero { stroke: #e05555; }

.g-node { cursor: pointer; }
.g-node circle { stroke-width: 2; transition: r .15s; }
.g-node:hover circle { filter: brightness(1.3); }
.g-node.pinned circle { stroke: #fff !important; stroke-width: 3; }

.g-node-label {
  font-size: 11px;
  fill: #ddd;
  text-anchor: middle;
  pointer-events: none;
  text-shadow: 0 1px 3px #000;
}

/* 节点信息面板 */
.graph-node-info {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 320px;
  background: #1e1e1e;
  border: 1px solid #333;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,.7);
  z-index: 50;
  max-height: 60vh;
  display: flex;
  flex-direction: column;
}

.graph-node-info-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px 10px;
  background: #242424;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
}

.graph-node-info-header img {
  width: 60px;
  height: 36px;
  object-fit: cover;
  border-radius: 5px;
  border: 1px solid #333;
  flex-shrink: 0;
}

.graph-node-info-header > div { flex: 1; min-width: 0; }
.graph-node-info-name { font-size: 15px; font-weight: 700; color: #fff; }
.graph-node-info-sub { font-size: 12px; color: #888; margin-top: 2px; }

.graph-node-info-header button {
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  flex-shrink: 0;
}

.graph-node-info-header button:hover { color: #ccc; }

.graph-node-info-body {
  overflow-y: auto;
  padding: 12px 14px;
  flex: 1;
}

.graph-info-section { margin-bottom: 14px; }
.graph-info-section:last-child { margin-bottom: 0; }
.graph-info-section-title {
  font-size: 11px;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 8px;
}

.graph-info-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #2a2a2a;
  font-size: 12px;
}

.graph-info-row:last-child { border-bottom: none; }

.graph-info-row img {
  width: 28px;
  height: 18px;
  object-fit: cover;
  border-radius: 3px;
  border: 1px solid #333;
  flex-shrink: 0;
}

.graph-info-row .info-name { color: #eee; font-weight: 600; flex: 1; cursor: pointer; }
.graph-info-row .info-name:hover { color: #4a9eff; text-decoration: underline; }
.graph-info-row .info-reason { color: #888; font-size: 11px; }

/* ── 英雄页筛选栏 ── */
.hero-filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 32px;
  max-width: 1400px;
  margin: 0 auto;
  flex-wrap: wrap;
}

/* 搜索框 */
.hero-filter-search {
  position: relative;
  flex: 0 0 260px;
}

.hero-filter-search input {
  width: 100%;
  background: #13161e;
  border: 1px solid #2a2f3e;
  border-radius: 8px;
  color: #d0d4de;
  font-size: 14px;
  padding: 9px 14px 9px 38px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}

.hero-filter-search input::placeholder { color: #6b7590; }

.hero-filter-search input:focus {
  border-color: #3a4460;
  box-shadow: 0 0 0 2px rgba(79,130,247,.12);
}

.hero-filter-search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: #6b7590;
  pointer-events: none;
  display: flex;
  align-items: center;
}

.hero-filter-search-clear {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #8892a4;
  cursor: pointer;
  font-size: 13px;
  padding: 2px 4px;
  line-height: 1;
  transition: color .12s;
}
.hero-filter-search-clear:hover { color: #aaa; }

/* 自定义下拉筛选器 */
.hf-dropdown {
  position: relative;
  flex-shrink: 0;
  user-select: none;
}

.hf-dropdown-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #13161e;
  border: 1px solid #2a2f3e;
  border-radius: 8px;
  color: #d0d4de;
  font-size: 13px;
  padding: 9px 12px 9px 14px;
  cursor: pointer;
  white-space: nowrap;
  min-width: 130px;
  transition: border-color .15s, background .15s;
}

.hf-dropdown-btn:hover,
.hf-dropdown.open .hf-dropdown-btn {
  border-color: #3a4460;
  background: #1a1f2e;
}

.hf-dropdown-label { color: #9aa3b5; font-size: 12px; }
.hf-dropdown-value { flex: 1; color: #d0d4de; }
.hf-dropdown-arrow {
  color: #9aa3b5;
  font-size: 10px;
  transition: transform .15s;
}
.hf-dropdown.open .hf-dropdown-arrow { transform: rotate(180deg); }

.hf-dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 100%;
  background: #1a1f2e;
  border: 1px solid #2a3050;
  border-radius: 8px;
  overflow: hidden;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}

.hf-dropdown.open .hf-dropdown-menu { display: block; }

.hf-dropdown-item {
  padding: 9px 16px;
  font-size: 13px;
  color: #b0b8cc;
  cursor: pointer;
  transition: background .1s, color .1s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.hf-dropdown-item:hover { background: #222840; color: #fff; }
.hf-dropdown-item.selected { color: #fff; background: #1e2540; }
.hf-dropdown-item.selected::before {
  content: '✓';
  font-size: 11px;
  color: #4fc3f7;
  width: 12px;
  flex-shrink: 0;
}
.hf-dropdown-item:not(.selected)::before {
  content: '';
  width: 12px;
  flex-shrink: 0;
}

/* 旧搜索栏样式不再需要 */
.hero-search-bar { display: none; }
.hero-search-icon, .hero-search-clear { display: none; }

/* ── 天赋树 ── */
.talent-tree-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 4px;
}

.talent-tree {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 680px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid #3a3528;
}

.talent-row {
  display: flex;
  align-items: center;
  min-height: 56px;
  background: #2a2820;
  border-bottom: 1px solid #1a1812;
  position: relative;
}

.talent-row:last-child { border-bottom: none; }

.talent-row:hover { background: #322f24; }

.talent-cell {
  flex: 1;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  color: #d4c89a;
  line-height: 1.35;
  cursor: default;
}

.talent-cell.left  { text-align: right; padding-right: 24px; }
.talent-cell.right { text-align: left;  padding-left: 24px; }

.talent-level-badge {

  height: 44px;

  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 800;
  color: #fff;
  background: radial-gradient(circle at 40% 35%, #e8a040, #c06010 60%, #7a3a08);
  box-shadow: 0 0 10px rgba(220,140,40,.6), 0 0 22px rgba(200,100,20,.35), inset 0 1px 2px rgba(255,220,120,.4);
  border: 2px solid rgba(255,200,80,.35);
  z-index: 1;
  letter-spacing: -0.5px;
}

/* ── 详情页图谱面板 ── */
.detail-graph-pane {
  display: flex;
  flex-direction: column;
  background: #0f1320;
  border-radius: 12px;
  border: 1px solid #1e2535;
  overflow: hidden;
  margin-bottom: 16px;
  height: 520px;
}
.detail-graph-pane .graph-split-container {
  flex: 1;
  min-height: 0;
  border-radius: 0 0 12px 12px;
}

/* ── 克制关系 ── */
.counter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
  margin-bottom: 4px;
}

.counter-card {
  background: #1e1c16;
  border: 1px solid #3a3528;
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: background .15s;
}

.counter-card:hover { background: #252318; }

.counter-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.counter-hero-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #3a3528;
  flex-shrink: 0;
}

.counter-hero-name {
  font-size: 15px;
  font-weight: 700;
  color: #d4c89a;
  flex: 1;
}

.counter-strength-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

.counter-strength-badge.strong {
  background: rgba(224,85,85,.15);
  color: #e05555;
  border: 1px solid rgba(224,85,85,.3);
}

.counter-strength-badge.moderate {
  background: rgba(180,120,60,.15);
  color: #e0a060;
  border: 1px solid rgba(180,120,60,.3);
}

.counter-reasons {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.counter-reason {
  font-size: 13px;
  color: #b0a898;
  line-height: 1.5;
  padding-left: 12px;
  position: relative;
}

.counter-reason::before {
  content: '·';
  position: absolute;
  left: 2px;
  color: #8a7868;
}

.counter-loading {
  color: #6b7590;
  font-size: 13px;
  padding: 16px 0;
  text-align: center;
}

/* ── 克制关系图 ── */
.counter-graph-wrap {
  width: 100%;
  background: #161410;
  border: 1px solid #2e2b20;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
  position: relative;
}

.counter-graph-wrap svg {
  display: block;
  width: 100%;
}

.counter-graph-wrap .graph-hint {
  position: absolute;
  bottom: 10px;
  right: 14px;
  font-size: 11px;
  color: #7a7060;
  pointer-events: none;

/* tooltip */

  position: fixed;
  background: rgba(20,18,12,.95);
  border: 1px solid #3a3528;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: #c8b88a;
  pointer-events: none;
  max-width: 260px;
  line-height: 1.5;

.synergy-hero-icon {

.synergy-hero-name {

  font-weight: 700;

.synergy-strength-badge {

.synergy-reasons {

  gap: 5px;
}

.synergy-reason {

.synergy-reason::before {

  left: 2px;
  color: #6a9070;
}

.synergy-loading {
  color: #6b7590;
  font-size: 13px;
  padding: 16px 0;
  text-align: center;
}

/* ── 配合关系图 ── */
.synergy-graph-wrap {
  width: 100%;
  background: #101610;
  border: 1px solid #1e2e20;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;

}

.synergy-graph-wrap svg {
  display: block;
  width: 100%;
}

.synergy-graph-wrap .graph-hint {
  position: absolute;
  bottom: 10px;
  right: 14px;

<script>

const CDN = 'https://cdn.cloudflare.steamstatic.com';
let heroesData = {}, itemsData = {}, currentTab = 'heroes', searchQuery = '';

const ATTR = {
  str: { label: '力量', color: '#e05555', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_strength.png' },
  agi: { label: '敏捷', color: '#6ec86e', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_agility.png' },
  int: { label: '智力', color: '#6aacee', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_intelligence.png' },
  all: { label: '全才', color: '#4fd6cc', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_universal.png' },
};

const ATTR_TAG = { str: 'tag-str', agi: 'tag-agi', int: 'tag-int', all: 'tag-all' };

async function loadData() {
  try {
    const [hr, ir, mr] = await Promise.all([
      fetch('/api/heroes'), fetch('/api/items'), fetch('/api/meta')
    ]);
    heroesData = await hr.json();
    itemsData = await ir.json();
    const meta = await mr.json();
    if (meta.patch) {
      const d = meta.patch_date ? new Date(meta.patch_date).toLocaleDateString('zh-CN') : '';
      document.getElementById('versionBadge').innerHTML = `版本 <span>${meta.patch}</span>${d ? ' · ' + d : ''}`;
    }
    renderItems();
  } catch(e) {
    console.error('loadData failed', e);
  }
}

function showTab(tab) {
  if (tab !== 'items') { window.location.href = '/' + tab; return; }
  currentTab = tab;
  document.getElementById('itemsView').style.display = '';
  document.getElementById('itemDetailView').style.display = 'none';
  renderItems();
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  if (currentTab === 'heroes') renderHeroes();
  else renderItems();
}

let heroSearchQuery = '';
function onHeroSearch() {
  heroSearchQuery = document.getElementById('heroSearchInput').value.trim().toLowerCase();
  document.getElementById('heroSearchClear').style.display = heroSearchQuery ? '' : 'none';
  renderHeroes();
}
function clearHeroSearch() {
  document.getElementById('heroSearchInput').value = '';
  document.getElementById('heroSearchClear').style.display = 'none';
  heroSearchQuery = '';
  renderHeroes();
}
function onHeroFilter() { renderHeroes(); }

// ── 自定义下拉 ──
const dropdownState = { attrDropdown: '', roleDropdown: '' };

function toggleDropdown(id) {
  const el = document.getElementById(id);
  const isOpen = el.classList.contains('open');
  // 关闭所有
  document.querySelectorAll('.hf-dropdown.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

function selectDropdown(id, value, label) {
  dropdownState[id] = value;
  document.getElementById(id).classList.remove('open');
  document.getElementById(id + 'Value').textContent = label;
  // 更新选中样式
  document.querySelectorAll(`#${id} .hf-dropdown-item`).forEach(item => {
    item.classList.toggle('selected', item.dataset.value === value);
  });
  renderHeroes();
}

// 点击外部关闭下拉
document.addEventListener('click', e => {
  if (!e.target.closest('.hf-dropdown')) {
    document.querySelectorAll('.hf-dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

function heroMatchesSearch(h, q) {
  if (!q) return true;
  if (h.name && h.name.toLowerCase().includes(q)) return true;
  if (h.name_en && h.name_en.toLowerCase().includes(q)) return true;
  if (h.nickname && h.nickname.some(n => n.toLowerCase().includes(q))) return true;
  return false;
}

function heroMatchesFilters(h) {
  const attrFilter = dropdownState.attrDropdown || '';
  const roleFilter = dropdownState.roleDropdown || '';
  if (attrFilter && h.primary_attr !== attrFilter) return false;
  if (roleFilter && !(h.roles || []).includes(roleFilter)) return false;
  return true;
}

// ── 角色中文映射 ──
const ROLE_CN = {
  'Carry': '核心', 'Support': '辅助', 'Nuker': '爆发', 'Disabler': '控制',
  'Initiator': '先手', 'Durable': '耐久', 'Escape': '逃跑', 'Pusher': '推进',
  'Jungle': '打野'
};
const ROLE_CLASS = {
  'Carry': 'role-carry', 'Support': 'role-support', 'Nuker': 'role-nuker',
  'Disabler': 'role-disabler', 'Initiator': 'role-initiator', 'Durable': 'role-durable',
  'Escape': 'role-escape', 'Pusher': 'role-pusher', 'Jungle': 'role-jungle'
};

function heroRoleBadge(roles) {
  if (!roles || !roles.length) return '';
  const primary = roles[0];
  const cls = ROLE_CLASS[primary] || 'role-default';
  const label = ROLE_CN[primary] || primary;
  return `<span class="hero-card-role ${cls}">${label}</span>`;
}

// ── 英雄列表 ──
function renderHeroes() {
  const grouped = { str: [], agi: [], int: [], all: [] };

  const effectiveQuery = heroSearchQuery || searchQuery;
  const attrFilter = dropdownState.attrDropdown || '';
  for (const [key, h] of Object.entries(heroesData)) {
    const attr = h.primary_attr;
    if (!grouped[attr]) continue;
    if (!heroMatchesSearch(h, effectiveQuery)) continue;
    if (!heroMatchesFilters(h)) continue;
    grouped[attr].push([key, h]);
  }

  // 属性筛选时只显示匹配的列
  const leftAttrs = attrFilter ? (['str','int'].includes(attrFilter) ? [attrFilter] : []) : ['str', 'int'];
  const rightAttrs = attrFilter ? (['agi','all'].includes(attrFilter) ? [attrFilter] : []) : ['agi', 'all'];

  function buildAttrSection(attr) {
    const heroes = grouped[attr];
    if (!heroes.length) return '';
    const info = ATTR[attr];
    return `
      <div class="attr-section attr-${attr}">
        <div class="attr-header">
          <img class="attr-icon" src="${info.icon}" onerror="this.style.display='none'">
          <span class="attr-label">${info.label}</span>
          <span class="attr-hero-count">英雄 <b>${heroes.length}</b></span>
        </div>
        <div class="hero-grid">
          ${heroes.map(([key, h]) => `
            <div class="hero-card" onclick="showHeroDetail('${key}')">
              <div class="hero-card-portrait">
                ${h.img ? `<img src="${h.img}" alt="${h.name}" loading="lazy" onerror="this.style.opacity='.3'">` : ''}
              </div>
              <div class="hero-card-info">
                <div class="hero-name">${h.name}</div>
                ${heroRoleBadge(h.roles)}
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // 上行：力量 | 敏捷，下行：智力 | 全才 — 各行独立对齐
  const row1 = [
    attrFilter ? '' : buildAttrSection('str'),
    attrFilter ? '' : buildAttrSection('agi'),
    attrFilter === 'str' ? buildAttrSection('str') : '',
    attrFilter === 'agi' ? buildAttrSection('agi') : '',
  ];
  const row2 = [
    attrFilter ? '' : buildAttrSection('int'),
    attrFilter ? '' : buildAttrSection('all'),
    attrFilter === 'int' ? buildAttrSection('int') : '',
    attrFilter === 'all' ? buildAttrSection('all') : '',
  ];

  // 无筛选：2列2行网格，每行独立；有筛选：单列
  let html;
  if (!attrFilter) {
    html  = '<div class="hero-rows">';
    html += `<div class="columns">${buildAttrSection('str')}${buildAttrSection('agi')}</div>`;
    html += `<div class="columns">${buildAttrSection('int')}${buildAttrSection('all')}</div>`;
    html += '</div>';
  } else {
    const section = buildAttrSection(attrFilter);
    html = section ? `<div class="hero-rows">${section}</div>` : '';
  }

  const anyResult = Object.values(grouped).some(g => g.length > 0);
  document.getElementById('heroesMain').innerHTML = anyResult ? html : '<div class="empty-state">没有找到匹配的英雄</div>';
}

// ── 详情页 Tab 切换 ──
function switchHeroTab(panelId) {
  document.querySelectorAll('#heroDetailTabs .detail-tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.panel === panelId);
  });
  document.querySelectorAll('#detailView .detail-tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === panelId);
  });
  // Re-center graph after container becomes visible
  requestAnimationFrame(() => {
    const recenter = (panel, containerId) => {
      if (!panel) return;
      const container = document.getElementById(containerId);
      const w = container.clientWidth, h = container.clientHeight;
      if (w && h) {
        panel.sim.force('center', d3.forceCenter(w / 2, h / 2));
        panel.sim.alpha(0.4).restart();
      }
      panel.svg.call(panel.zoom.transform, d3.zoomIdentity);
    };
    if (panelId === 'heroTabCounter') recenter(detailPanelCounter, 'detailCounterContainer');
    else if (panelId === 'heroTabSynergy') recenter(detailPanelSynergy, 'detailSynergyContainer');
  });
}

function switchItemTab(panelId) {
  document.querySelectorAll('#itemDetailTabs .detail-tab-btn').forEach(btn => {

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// 详情页图谱：复用图谱页的 createPanel / drawPanel
let detailPanelCounter = null;
let detailPanelSynergy = null;

function renderDetailGraph({ svgId, containerId, centerId, centerHero, entries, type }) {
  // Ensure center node and neighbor nodes are in graphAllNodes
  if (!graphAllNodes[centerId]) {
    graphAllNodes[centerId] = {
      id: centerId, type: 'hero',
      name: centerHero.name,
      img: centerHero.icon || centerHero.img || '',
      attr: centerHero.primary_attr,
    };
  }
  entries.forEach(e => {
    const heroId = `npc_dota_hero_${e.key}`;
    if (!graphAllNodes[heroId]) {
      graphAllNodes[heroId] = {
        id: heroId, type: 'hero',
        name: e.name,
        img: `${CDN}/apps/dota2/images/dota_react/heroes/icons/${e.key}.png`,
      };
    }
  });

  const edges = entries.map(e => ({
    source: `npc_dota_hero_${e.key}`,
    target: centerId,
    type: 'hero-hero',
    strength: e.strength || 'moderate',
    reasons: e.reasons || [],
    reason: (e.reasons || [])[0] || '',
  }));

  const panel = createPanel(svgId, containerId);
  if (type === 'counter') detailPanelCounter = panel;
  else detailPanelSynergy = panel;

  drawPanel(panel, centerId, edges, 'inbound');

  // Fix center after container is visible (clientHeight may have been 0 during createPanel)
  requestAnimationFrame(() => {
    const container = document.getElementById(containerId);
    const w = container.clientWidth, h = container.clientHeight;
    if (w && h) {
      panel.sim.force('center', d3.forceCenter(w / 2, h / 2));
      panel.sim.alpha(0.4).restart();
    }
  });
}

let itemSearchQuery = '';
let activeItemKey = null;
let activeItemCat = 'all';

function selectItemTab(cat) {
  activeItemCat = cat;
  document.querySelectorAll('.items-tab-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.cat === cat));
  renderItems();
}

function onItemSearch() {
  itemSearchQuery = document.getElementById('itemSearchInput').value.trim().toLowerCase();
  document.getElementById('itemSearchClear').style.display = itemSearchQuery ? '' : 'none';
  renderItems();
}

function clearItemSearch() {
  document.getElementById('itemSearchInput').value = '';
  document.getElementById('itemSearchClear').style.display = 'none';
  itemSearchQuery = '';
  renderItems();
}

// ── 物品列表 ──
const TIER_LABELS = { 0: '一级', 1: '二级', 2: '三级', 3: '四级', 4: '五级' };
function renderItems() {
  const body = document.getElementById('itemsBody');
  const empty = document.getElementById('itemEmpty');

  // Tab 对应分类 id 映射
  const TAB_MAP = {
    consumables: ['consumables'],
    attributes:  ['attributes'],
    equipment:   ['equipment','misc'],
    accessories: ['accessories'],
    arcane:      ['arcane'],
    weapons:     ['weapons'],
    armor:       ['armor'],
    support:     ['support'],
    neutral:     ['__neutral__'],
    all:         null,
  };

  // 分类元信息（图标、英文名、颜色类）
  const CAT_META = {
    consumables: { icon: '🧪', en: 'Consumables', color: 'color-green' },
    attributes:  { icon: '⚡', en: 'Attributes',  color: 'color-blue' },
    equipment:   { icon: '🛡', en: 'Equipment',   color: 'color-blue' },
    misc:        { icon: '🔧', en: 'Misc',        color: 'color-blue' },
    secret:      { icon: '🏪', en: 'Secret Shop', color: 'color-gold' },
    accessories: { icon: '👟', en: 'Accessories', color: 'color-green' },
    arcane:      { icon: '🔮', en: 'Arcane',      color: 'color-purple' },
    weapons:     { icon: '⚔', en: 'Weapons',     color: 'color-gold' },
    armor:       { icon: '🪖', en: 'Armor',       color: 'color-blue' },
    support:     { icon: '💫', en: 'Support',     color: 'color-teal' },
  };

  function makeItemBtn(key, item, colorCls) {
    return `<div class="item-icon-btn ${colorCls}" onclick="showItemPanel('${key}')">
      <div class="item-img-wrap">
        <img src="${item.img}" alt="${item.name || ''}" loading="lazy" onerror="this.style.opacity='.3'">
      </div>
      <div class="item-icon-name">${item.name || item.name_en}</div>
    </div>`;
  }

  if (itemSearchQuery) {
    body.className = 'items-body search-mode';
    const entries = Object.entries(itemsData).filter(([, item]) => {
      if (!item.name_en) return false;
      if (item.name && item.name.toLowerCase().includes(itemSearchQuery)) return true;
      if (item.name_en.toLowerCase().includes(itemSearchQuery)) return true;
      if (item.nickname && item.nickname.some(n => n.toLowerCase().includes(itemSearchQuery))) return true;
      return false;
    });
    empty.style.display = entries.length ? 'none' : 'block';
    body.innerHTML = `<div class="item-search-list">${entries.map(([key, item]) => `
      <div class="item-card" onclick="showItemPanel('${key}')">
        ${item.img ? `<img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.style.opacity='.3'">` : ''}
        <div class="item-info">
          <div class="item-name">${item.name || item.name_en}</div>
          ${item.is_neutral ? `<div class="item-cost" style="color:#4fd6cc">中立物品</div>` : item.cost ? `<div class="item-cost">💰 ${item.cost}</div>` : ''}
        </div>
      </div>`).join('')}</div>`;
    return;
  }

  empty.style.display = 'none';
  body.className = 'items-body';

  const allCategories = [...(ITEM_CATEGORIES.basic || []), ...(ITEM_CATEGORIES.upgrade || [])];
  const allowedIds = TAB_MAP[activeItemCat]; // null = 全部

  // 普通分类
  const normalHtml = allCategories
    .filter(cat => !allowedIds || allowedIds.includes(cat.id))
    .map(cat => {
      const items = cat.keys.map(k => [k, itemsData[k]]).filter(([, v]) => v && v.img);
      if (!items.length) return '';
      const meta = CAT_META[cat.id] || { icon: '📦', en: cat.id, color: '' };
      return `
        <div class="item-category">
          <div class="item-category-header">
            <span class="item-category-icon">${meta.icon}</span>
            <span class="item-category-cn">${cat.label}</span>
            <span class="item-category-en">${meta.en}</span>
          </div>
          <div class="item-icon-grid">
            ${items.map(([key, item]) => makeItemBtn(key, item, meta.color)).join('')}
          </div>
        </div>`;
    }).join('');

  // 中立物品
  let neutralHtml = '';
  if (!allowedIds || allowedIds.includes('__neutral__')) {
    const neutralByTier = {};
    for (const [key, item] of Object.entries(itemsData)) {
      if (!item.is_neutral || !item.img) continue;
      const t = item.neutral_tier || 0;
      if (!neutralByTier[t]) neutralByTier[t] = [];
      neutralByTier[t].push([key, item]);
    }
    if (Object.keys(neutralByTier).length) {
      neutralHtml = `
        <div class="item-category">
          <div class="item-category-header">
            <span class="item-category-icon">🗡</span>
            <span class="item-category-cn">中立物品</span>
            <span class="item-category-en">Neutral Items</span>
          </div>
          ${Object.keys(neutralByTier).sort((a,b)=>a-b).map(tier => `
            <div class="neutral-tier-group">
              <div class="neutral-tier-label">${TIER_LABELS[tier] || `Tier ${tier}`}</div>
              <div class="item-icon-grid">
                ${neutralByTier[tier].map(([key, item]) => makeItemBtn(key, item, 'color-teal')).join('')}
              </div>
            </div>`).join('')}
        </div>`;
    }
  }

  body.innerHTML = normalHtml + neutralHtml;
}

function showItemPanel(key) {
  const item = itemsData[key];
  if (!item) return;

  activeItemKey = key;

  document.getElementById('itemDetailIcon').src = item.img || '';
  document.getElementById('itemDetailBgImg').src = item.img || '';
  document.getElementById('itemDetailName').textContent = item.name || item.name_en;
  document.getElementById('itemDetailEn').textContent = item.name_en || '';
  document.getElementById('itemDetailCost').textContent = item.is_neutral ? '⚔ 中立物品' : item.cost ? `💰 ${item.cost} 金币` : '';

  const attrib = item.attrib || {};
  const bonuses = item.bonuses || [];

  // 属性加成区域
  if (bonuses.length > 0) {
    document.getElementById('itemBonusesSection').style.display = '';
    document.getElementById('itemBonusesGrid').innerHTML = bonuses.map(b => {
      const valDisplay = b.pct ? `${b.sign}${b.value}%` : `${b.sign}${b.value}`;
      const cls = b.sign === '-' ? 'neg' : 'pos';
      return `<div class="item-bonus-row">
        <span class="item-bonus-val ${cls}">${valDisplay}</span>
        <span class="item-bonus-label">${b.label}</span>
      </div>`;
    }).join('');
  } else {
    document.getElementById('itemBonusesSection').style.display = 'none';
  }

  // 基本信息卡片（仅保留冷却/蓝耗等非bonus信息）
  const rows = [];
  const cd = item.cooldown && item.cooldown !== '0' && item.cooldown !== 'null' && item.cooldown !== 'False' ? item.cooldown : '';
  const mc = item.manacost && item.manacost !== '0' && item.manacost !== 'null' && item.manacost !== 'False' ? item.manacost : '';
  rows.push({ label: '名称', value: item.name || '—' });
  if (item.nickname && item.nickname.length) rows.push({ label: '绰号', value: item.nickname.join(' / ') });
  if (cd) rows.push({ label: '冷却时间', value: `${cd}s` });
  if (mc) rows.push({ label: '消耗蓝量', value: mc });
  if (item.is_neutral) rows.push({ label: '获取方式', value: '中立物品掉落', cls: 'cost-val' });
  else if (item.cost) rows.push({ label: '购买价格', value: `${item.cost} 金币`, cls: 'cost-val' });

  document.getElementById('itemInfoCard').innerHTML = rows.length ? `
    <div class="d-card accent-blue" style="margin-bottom:16px">
      <div class="d-card-header">
        <div class="d-card-title"><span class="d-card-icon">📋</span>物品信息</div>
        ${item.qual ? `<span class="d-card-badge">${item.qual}</span>` : ''}
      </div>
      <div class="d-card-body" style="padding:0">
        <div class="item-info-card" style="border:none;border-radius:0;margin:0;background:transparent">
          <img class="item-info-img" src="${item.img || ''}" alt="${item.name || ''}" onerror="this.style.opacity='.3'">
          <div class="item-info-rows">
            ${rows.map(r => `
              <div class="item-info-row">
                <span class="item-info-label">${r.label}</span>
                <span class="item-info-value${r.cls ? ' ' + r.cls : ''}">${r.value}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>` : '';

  // 技能描述
  const descHtml = item.description ? formatDesc(item.description, attrib) : '';
  if (descHtml) {
    document.getElementById('itemDescCardWrap').style.display = '';
    document.getElementById('itemDescCard').innerHTML = descHtml;
  } else {
    document.getElementById('itemDescCardWrap').style.display = 'none';
  }

  function renderCounterGrid(elId, entries) {
    const grid = document.getElementById(elId);
    grid.innerHTML = entries.map(({ key: cKey, item: c, reason }) => `
      <div class="item-counter-card" onclick="showItemPanel('${cKey}')">
        <img src="${c.img || ''}" alt="${c.name || ''}" onerror="this.style.opacity='.3'">
        <div class="counter-info">
          <div class="counter-name">${c.name || c.name_en}</div>
          ${c.cost != null ? `<div class="counter-cost">💰 ${c.cost} 金币</div>` : ''}
          ${reason ? `<div class="counter-reason">${reason}</div>` : ''}
        </div>
      </div>`).join('');
  }

  function renderHeroCounterGrid(elId, entries) {
    const grid = document.getElementById(elId);
    grid.innerHTML = entries.map(({ heroKey, hero, reason }) => `
      <div class="item-hero-counter-card" onclick="showHeroDetail('${heroKey}')">
        <img src="${hero.icon || hero.img || ''}" alt="${hero.name || ''}" onerror="this.style.opacity='.3'">
        <div class="hero-counter-info">
          <div class="hero-counter-name">${hero.name || hero.name_en}</div>
          ${reason ? `<div class="hero-counter-reason">${reason}</div>` : ''}
        </div>
      </div>`).join('');
  }

  function renderHeroFitGrid(elId, entries) {
    const grid = document.getElementById(elId);
    grid.innerHTML = entries.map(({ heroKey, hero, reason }) => `
      <div class="item-hero-fit-card" onclick="showHeroDetail('${heroKey}')">
        <img src="${hero.icon || hero.img || ''}" alt="${hero.name || ''}" onerror="this.style.opacity='.3'">
        <div class="hero-fit-info">
          <div class="hero-fit-name">${hero.name || hero.name_en}</div>
          ${reason ? `<div class="hero-fit-reason">${reason}</div>` : ''}
        </div>
      </div>`).join('');
  }

  function parseCounterEntries(list) {
    return (list || []).map(e => {
      const cKey = typeof e === 'string' ? e : e.counter;
      const reason = typeof e === 'object' ? (e.reason || '') : '';
      const cItem = itemsData[cKey];
      return cItem ? { key: cKey, item: cItem, reason } : null;
    }).filter(Boolean);
  }

  function parseHeroCounterEntries(list) {
    return (list || []).map(e => {
      if (typeof e !== 'object') return null;
      const shortKey = e.hero;
      const fullKey = `npc_dota_hero_${shortKey}`;
      const hero = heroesData[fullKey];
      return hero ? { heroKey: fullKey, hero, reason: e.reason || '' } : null;
    }).filter(Boolean);
  }

  const itemDisplayName = item.name || item.name_en;

  // hero_fits = 适合出装该物品的英雄
  const heroFitEntries = parseHeroCounterEntries(item.hero_fits);
  if (heroFitEntries.length > 0) {
    document.getElementById('itemHeroFitsTitle').textContent = `适合「${itemDisplayName}」的英雄`;
    document.getElementById('itemHeroFitsCard').style.display = '';
    renderHeroFitGrid('itemHeroFitsGrid', heroFitEntries);
  } else {
    document.getElementById('itemHeroFitsCard').style.display = 'none';
  }

  // hero_counters = 被该物品克制的英雄
  const heroCounterEntries = parseHeroCounterEntries(item.hero_counters);
  if (heroCounterEntries.length > 0) {
    document.getElementById('itemHeroCountersTitle').textContent = `被「${itemDisplayName}」克制的英雄`;
    document.getElementById('itemHeroCountersCard').style.display = '';
    renderHeroCounterGrid('itemHeroCountersGrid', heroCounterEntries);
  } else {
    document.getElementById('itemHeroCountersCard').style.display = 'none';
  }

  // counters_of = 当前物品克制的对象（被「本物品」克制的物品）
  const counteredByEntries = parseCounterEntries(item.counters_of);
  if (counteredByEntries.length > 0) {
    document.getElementById('itemCounteredByTitle').textContent = `被「${itemDisplayName}」克制的物品`;
    document.getElementById('itemCounteredByCard').style.display = '';
    renderCounterGrid('itemCounteredByGrid', counteredByEntries);
  } else {
    document.getElementById('itemCounteredByCard').style.display = 'none';
  }

  // counters = 克制当前物品的对象（克制「本物品」的物品）
  const counterEntries = parseCounterEntries(item.counters);
  if (counterEntries.length > 0) {
    document.getElementById('itemCountersTitle').textContent = `克制「${itemDisplayName}」的物品`;
    document.getElementById('itemCountersCard').style.display = '';
    renderCounterGrid('itemCountersGrid', counterEntries);
  } else {
    document.getElementById('itemCountersCard').style.display = 'none';
  }

  // 背景故事 lore
  if (item.lore_en || item.lore_zh) {
    document.getElementById('itemLoreCard').style.display = '';
    document.getElementById('itemLoreBody').innerHTML =
      (item.lore_en ? `<div class="item-lore-en">${item.lore_en}</div>` : '') +
      (item.lore_zh ? `<div class="item-lore-zh">${item.lore_zh}</div>` : '');
  } else {
    document.getElementById('itemLoreCard').style.display = 'none';
  }

  document.getElementById('itemsView').style.display = 'none';
  document.getElementById('itemDetailView').style.display = 'block';

  // Show/hide dynamic tabs based on available content, then reset to overview
  const hasSkill = !!(item.description);
  const hasFits = !!(item.hero_fits && item.hero_fits.length) || !!(item.hero_counters);
  const hasCounters = !!(item.counters_of) || !!(item.counters);
  const hasLore = !!(item.lore_en || item.lore_zh);
  document.getElementById('itemTabSkillBtn').style.display = hasSkill ? '' : 'none';
  document.getElementById('itemTabHeroesBtn').style.display = hasFits ? '' : 'none';
  document.getElementById('itemTabCountersBtn').style.display = hasCounters ? '' : 'none';
  document.getElementById('itemTabLoreBtn').style.display = hasLore ? '' : 'none';
  switchItemTab('itemTabOverview');

  window.scrollTo(0, 0);
}

function backToItems() {
  document.getElementById('itemDetailView').style.display = 'none';
  document.getElementById('itemsView').style.display = '';
  activeItemKey = null;
}

function formatDesc(text, attrib) {
  return text
    .replace(/\\n/g, '<br>').replace(/\n/g, '<br>')
    .replace(/%([A-Za-z0-9_]+)%%%/g, (_, k) => {
      const v = attrib && attrib[k];
      return v != null ? `<b style="color:#c89b3c">${v}%</b>` : `<span style="color:#6b7590">${k}%</span>`;
    })
    .replace(/%([A-Za-z0-9_]+)%/g, (_, k) => {
      const v = attrib && attrib[k];
      return v != null ? `<b style="color:#c89b3c">${v}</b>` : `<span style="color:#6b7590">${k}</span>`;
    });
}

  if (!navToggle.contains(e.target) && !mainNav.contains(e.target)) {
    navToggle.classList.remove('open');
    mainNav.classList.remove('open');
  }
});
